<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://unpkg.com; img-src https: data: blob:; connect-src https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSR QA Suite</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous"/>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Global top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 16px;
  background: var(--c-header-bg);
  color: #fff;
  flex-shrink: 0;
}
#topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
#topbar h1 span { color: var(--c-primary-light); }
#version {
  font-size: 11px; color: #aaa; background: #2e2e42;
  padding: 2px 7px; border-radius: 4px; font-family: monospace;
}
.tb-btn {
  padding: 6px 14px; background: var(--c-primary); color: #fff; border: none;
  border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600;
  text-decoration: none; display: inline-block; transition: background 0.15s;
}
.tb-btn:hover:not(:disabled) { background: var(--c-primary-dark); }
.tb-btn:disabled { background: var(--c-disabled-bg); cursor: not-allowed; }
.tb-btn.secondary { background: #3a3a52; }
.tb-btn.secondary:hover { background: #4a4a66; }

.tb-region { display: flex; gap: 6px; }
.tb-region select, .tb-bg select {
  padding: 5px 8px; border: 1px solid #3a3a52; border-radius: 4px;
  font-size: 12px; background: #2e2e42; color: #eee; cursor: pointer; max-width: 170px;
}
.tb-region select:disabled { opacity: 0.5; cursor: not-allowed; }
.tb-bg { font-size: 12px; color: #bbb; display: flex; align-items: center; gap: 6px; }

#status {
  font-size: 13px; color: #ddd; margin-left: auto; max-width: 380px;
  text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Tab bar ── */
#tabs {
  display: flex; gap: 2px; flex-shrink: 0;
  background: #e9e9ec; border-bottom: 1px solid var(--c-border); padding: 0 10px;
}
.tab {
  border: none; background: transparent; cursor: pointer;
  padding: 9px 16px; font-size: 13px; font-weight: 600; color: #666;
  border-bottom: 3px solid transparent; transition: color 0.12s, border-color 0.12s;
}
.tab:hover { color: var(--c-primary); }
.tab.active { color: var(--c-primary); border-bottom-color: var(--c-primary); background: #f5f5f7; }
.tab:disabled { color: #bbb; cursor: not-allowed; }

/* ── Body: sidebar + map ── */
#body { display: flex; flex: 1; overflow: hidden; }
#sidebar {
  width: 380px; flex-shrink: 0; display: flex; flex-direction: column;
  border-right: 1px solid var(--c-border); background: var(--c-sidebar-bg); overflow: hidden;
}
.tool-pane { display: none; flex-direction: column; overflow: hidden; height: 100%; }
.tool-pane.active { display: flex; }
.pane-top { padding: 10px 12px; border-bottom: 1px solid var(--c-border); background: #e9e9ec; flex-shrink: 0; }
.pane-list { flex: 1; overflow-y: auto; }

#map-wrap { position: relative; flex: 1; display: flex; }
#map { flex: 1; }

/* ── Processing overlay ── */
#overlay {
  position: absolute; inset: 0; background: rgba(245,245,247,0.85);
  display: none; align-items: center; justify-content: center; z-index: 1500;
}
#overlay.show { display: flex; }
.ov-card {
  background: #fff; padding: 24px 30px; border-radius: 10px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.22); min-width: 320px; text-align: center;
}
.ov-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.ov-sub { font-size: 13px; color: #666; margin-bottom: 16px; }
.ov-bar { height: 10px; background: #e3e3ea; border-radius: 6px; overflow: hidden; }
.ov-bar-fill { height: 100%; width: 0%; background: var(--c-primary); border-radius: 6px; transition: width 0.1s linear; }
.ov-stats { font-size: 13px; color: #444; margin-top: 12px; font-variant-numeric: tabular-nums; }

/* ── Empty hint ── */
#empty-hint {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  text-align: center; color: #889; pointer-events: none; z-index: 400;
}
#empty-hint h2 { font-size: 18px; color: #667; margin-bottom: 6px; }
#empty-hint p { font-size: 13px; max-width: 300px; line-height: 1.5; }
#empty-hint.hidden { display: none; }

/* ── Shared sidebar bits (used by tool modules) ── */
.pane-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.pane-title span:first-child { font-size: 13px; font-weight: 600; color: #444; }
.pane-count { color: var(--c-primary); font-weight: 600; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 4px 12px 12px; }
.stat-card { background: #fff; border: 1px solid var(--c-border); border-radius: 8px; padding: 10px 12px; }
.stat-num { font-size: 22px; font-weight: 700; color: #1a1a2e; font-variant-numeric: tabular-nums; }
.stat-lbl { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 2px; }

.region-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.region-table th { text-align: left; font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.03em; padding: 6px 12px; position: sticky; top: 0; background: var(--c-sidebar-bg); }
.region-table td { padding: 6px 12px; border-top: 1px solid #e6e6ea; }
.region-table td.num { text-align: right; font-variant-numeric: tabular-nums; color: #555; }
.region-table tr.click { cursor: pointer; }
.region-table tr.click:hover td { background: #eceaf6; }

.tool-stub { padding: 24px; color: #889; line-height: 1.5; }
.tool-stub h3 { color: #556; margin-bottom: 6px; }

/* ── Shared tool controls (pane-top) ── */
.pane-top input[type="text"] {
  width: 100%; margin-top: 7px; padding: 7px 10px; border: 1px solid var(--c-border);
  border-radius: 4px; font-size: 13px; background: #fff;
}
.pane-top input[type="text"]:focus { outline: 1px solid var(--c-primary); }
.pane-controls { display: flex; gap: 8px; align-items: center; margin-top: 7px; }
.ctl { font-size: 12px; color: #555; display: flex; align-items: center; gap: 5px; flex: 1; }
.ctl select { flex: 1; padding: 5px 7px; border: 1px solid var(--c-border); border-radius: 4px; font-size: 12px; background: #fff; cursor: pointer; }
.map-mode { display: flex; border: 1px solid var(--c-border); border-radius: 5px; overflow: hidden; }
.map-mode button { border: none; background: #fff; color: #555; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: 600; }
.map-mode button + button { border-left: 1px solid var(--c-border); }
.map-mode button.active { background: var(--c-primary); color: #fff; }
.filter-toggle {
  margin-top: 7px; width: 100%; padding: 6px 10px; background: #fff; border: 1px solid var(--c-border);
  border-radius: 4px; font-size: 13px; cursor: pointer; color: #555; text-align: left;
}
.filter-toggle.active { background: var(--c-error-bg, #f8d7da); border-color: var(--c-danger); color: #721c24; font-weight: 600; }
.muted { color: #999; font-size: 12px; }

/* ── Filter cards ── */
.sum-row { display: flex; flex-wrap: wrap; gap: 5px; margin: 4px 0 2px; }
.sum-label { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 7px; }
.sum-pill {
  display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 10px; background: #fff; border: 1px solid var(--c-border);
  color: #333; cursor: pointer; user-select: none; transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
}
.sum-pill:hover { border-color: var(--c-primary); }
.sum-pill.active { background: #f0ebfa; border-color: var(--c-primary); color: var(--c-primary-dark); box-shadow: inset 0 0 0 1px var(--c-primary); }
.sum-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── List rows (shared) ── */
.stop-item { padding: 10px 12px; border-bottom: 1px solid #e0e0e0; cursor: pointer; transition: background 0.1s; }
.stop-item:hover { background: #eaeaee; }
.stop-item.active { background: #ede7f6; border-left: 4px solid var(--c-primary); padding-left: 8px; }
.stop-item.active:hover { background: #e0d7f5; }
.si-name { font-size: 15px; font-weight: 600; color: #1a1a2e; display: flex; align-items: center; gap: 6px; }
.si-name .si-dot, .tg-dot, .gi-pog-dot { flex-shrink: 0; }
.tg-dot, .gi-pog-dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.si-nsr-link {
  margin-left: auto; font-size: 11px; font-weight: 600; color: var(--c-accent); text-decoration: none;
  padding: 1px 6px; border: 1px solid var(--c-accent-muted); border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.si-nsr-link:hover { background: var(--c-accent-hover); }
.si-id { font-size: 11px; color: #888; font-family: monospace; margin-top: 2px; }
.list-more { padding: 10px 12px; font-size: 12px; color: #888; text-align: center; }

/* ── AltName breakdown ── */
.si-alt { display: flex; gap: 6px; align-items: flex-start; margin-top: 6px; }
.si-type-tag { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 1px 6px; border-radius: 8px; color: #fff; flex-shrink: 0; margin-top: 1px; }
.alt-lines { flex: 1; min-width: 0; }
.alt-line { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin: 1px 0; font-size: 12px; }
.alt-rating { display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; cursor: help; }
.rg { display: block; }
.si-alt-name { color: #222; }
.si-lang { color: #999; font-size: 11px; }
.alt-pct { font-size: 10px; color: #999; font-variant-numeric: tabular-nums; }
.alt-flag { font-size: 10px; font-weight: 700; padding: 0 5px; border-radius: 6px; white-space: nowrap; }
.alt-flag.mal { background: #fff3cd; color: #5a4200; }
.alt-flag.col { background: #f8d7da; color: #721c24; }

/* ── Tags ── */
.stat-grid.compact { grid-template-columns: 1fr 1fr; gap: 6px; margin: 6px 0 2px; }
.stat-grid.compact .stat-card { padding: 7px 9px; }
.stat-grid.compact .stat-num { font-size: 17px; }
.tg-line { margin-top: 5px; font-size: 12px; line-height: 1.4; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tg-name { font-size: 10px; font-weight: 700; color: #fff; padding: 1px 7px; border-radius: 8px; white-space: nowrap; }
.tg-age { font-size: 11px; color: #555; font-weight: 600; font-variant-numeric: tabular-nums; }
.tg-resolved { font-size: 10px; color: #198754; font-weight: 600; }
.tg-comment { flex-basis: 100%; color: #333; padding-left: 2px; }

/* ── GOSP ── */
.gi-purpose { font-size: 12px; color: #555; margin-top: 3px; }
.gi-stats { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
.badge { display: inline-block; font-size: 12px; padding: 3px 9px; border-radius: 10px; font-weight: 700; white-space: nowrap; }
.b-total { background: #e0e0e0; color: #444; }
.b-ok { background: #d4edda; color: #155724; }
.b-bad { background: #f8d7da; color: #721c24; }
.b-warn { background: #fff3cd; color: #5a4200; }

/* ── Names ── */
.nm-detail { font-size: 11px; color: #555; line-height: 1.5; margin-top: 4px; }

/* ── Untouched / Recent changes ── */
.rc-new { font-size: 10px; font-weight: 700; color: #fff; background: var(--c-danger); padding: 0 5px; border-radius: 6px; vertical-align: middle; }

/* ── Popups ── */
.leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
.lp { min-width: 220px; max-width: 320px; }
.lp-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
.lp-id { font-family: monospace; font-size: 12px; color: #666; margin-bottom: 6px; }
.lp-ok { color: var(--c-ok); font-weight: 600; font-size: 13px; margin-top: 4px; }
.lp-bad { color: var(--c-danger); font-weight: 600; font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>

<header id="topbar">
  <h1>NSR QA <span>Suite</span></h1>
  <span id="version">v0.5</span>
  <button id="btn-load" class="tb-btn">Load NeTEx file…</button>
  <a id="btn-export" class="tb-btn secondary" target="_blank" rel="noopener">Get latest export ↧</a>
  <input id="file-input" type="file" accept=".xml,.zip" hidden/>

  <div class="tb-region">
    <select id="region-county" disabled><option value="">All counties</option></select>
    <select id="region-muni" disabled><option value="">All municipalities</option></select>
  </div>

  <label class="tb-bg">Map
    <select id="map-bg"></select>
  </label>

  <span id="status">No file loaded</span>
</header>

<nav id="tabs" role="tablist"></nav>

<div id="body">
  <aside id="sidebar"></aside>
  <div id="map-wrap">
    <div id="map"></div>
    <div id="overlay">
      <div class="ov-card">
        <div class="ov-title">Processing NeTEx export…</div>
        <div class="ov-sub" id="ov-sub">Scanning the file</div>
        <div class="ov-bar"><div class="ov-bar-fill" id="ov-fill"></div></div>
        <div class="ov-stats" id="ov-stats">0%</div>
      </div>
    </div>
    <div id="empty-hint">
      <div>
        <h2>No data loaded</h2>
        <p>Load the NeTEx export (or download the latest) to begin. One file feeds every tab.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="anonymous"></script>
<script>
(function () {
'use strict';

// ── config.js ────────────────────────────────────────────────────────────────

const CONFIG = {
  exportUrl:    'https://storage.googleapis.com/marduk-production/tiamat/Current_latest.zip',
  chunkSize:    4 * 1024 * 1024,
  nsrStopUrl:   'https://stoppested.entur.org/stop_place/{id}',
  nsrGroupUrl:  'https://stoppested.entur.org/group/{id}',
  nsrLinkLabel: 'NSR',
  tools: {
    overview:      true,
    altnames:      true,
    names:         true,
    tags:          true,
    gosp:          true,
    untouched:     true,
    recentchanges: true,
  },
};

const THEME = {
  primary:      '#6f42c1',
  primaryDark:  '#59359a',
  primaryLight: '#b89be0',
  accent:       '#0d6efd',
  accentMuted:  '#0d6efd33',
  accentHover:  '#0d6efd18',
  headerBg:     '#1c1c2e',
  sidebarBg:    '#f5f5f7',
  disabledBg:   '#555',
  border:       '#d0d0d0',
  ok:           '#198754',
  warn:         '#fd7e14',
  danger:       '#e63946',
  typeColors: {
    alias:       '#0d6efd',
    translation: '#fd7e14',
    label:       '#20c997',
    copy:        '#6f42c1',
    other:       '#adb5bd',
  },
  modeColors: {
    bus:        '#e63946',
    rail:       '#1d3557',
    tram:       '#2a9d8f',
    metro:      '#e76f51',
    water:      '#0d6efd',
    air:        '#7209b7',
    coach:      '#fb8500',
    funicular:  '#6a994e',
    cableway:   '#9c6644',
    trolleybus: '#d62828',
    taxi:       '#fcbf49',
    other:      '#adb5bd',
  },
};

function applyTheme(t) {
  t = t || THEME;
  const s = document.documentElement.style;
  const set = (k, v) => s.setProperty(k, v);
  set('--c-primary', t.primary);
  set('--c-primary-dark', t.primaryDark);
  set('--c-primary-light', t.primaryLight);
  set('--c-accent', t.accent);
  set('--c-accent-muted', t.accentMuted);
  set('--c-accent-hover', t.accentHover);
  set('--c-header-bg', t.headerBg);
  set('--c-sidebar-bg', t.sidebarBg);
  set('--c-disabled-bg', t.disabledBg);
  set('--c-border', t.border);
  set('--c-ok', t.ok);
  set('--c-warn', t.warn);
  set('--c-danger', t.danger);
}

// ── util.js ──────────────────────────────────────────────────────────────────

function escHtml(s) {
  return (s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function decodeEntities(s) {
  return (s || '')
    .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"').replace(/&apos;/g, "'")
    .replace(/&amp;/g, '&');
}

function stripCombining(s) {
  let out = '';
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    if (c < 0x0300 || c > 0x036F) out += s[i];
  }
  return out;
}

function norm(s) {
  const folded = (s || '').toLowerCase()
    .replace(/ø/g, 'o').replace(/å/g, 'a').replace(/æ/g, 'ae')
    .normalize('NFD');
  return stripCombining(folded).replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

function normLite(s) {
  return (s || '').toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, ' ').replace(/\s+/g, ' ').trim();
}

function tokenize(s) { return norm(s).split(' ').filter(Boolean); }
function consonants(s) { return norm(s).replace(/\s/g, '').replace(/[aeiouy]/g, ''); }

function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  let prev = Array.from({ length: n + 1 }, (_, i) => i);
  let cur = new Array(n + 1);
  for (let i = 1; i <= m; i++) {
    cur[0] = i;
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
    }
    const tmp = prev; prev = cur; cur = tmp;
  }
  return prev[n];
}
function editSim(a, b) {
  const ml = Math.max(a.length, b.length);
  return ml ? 1 - levenshtein(a, b) / ml : 1;
}
function lcsLen(a, b) {
  if (!a.length || !b.length) return 0;
  let best = 0;
  let prev = new Array(b.length + 1).fill(0);
  for (let i = 1; i <= a.length; i++) {
    const cur = new Array(b.length + 1).fill(0);
    for (let j = 1; j <= b.length; j++) {
      if (a[i - 1] === b[j - 1]) { cur[j] = prev[j - 1] + 1; if (cur[j] > best) best = cur[j]; }
    }
    prev = cur;
  }
  return best;
}
function jaccard(aTokens, bTokens) {
  const A = new Set(aTokens), B = new Set(bTokens);
  if (!A.size && !B.size) return 1;
  let inter = 0;
  for (const x of A) if (B.has(x)) inter++;
  return inter / (A.size + B.size - inter);
}
function noisyOr(values) { return 1 - values.reduce((p, v) => p * (1 - v), 1); }

function confColor(c) {
  const hue = Math.round((1 - Math.max(0, Math.min(1, c))) * 120);
  return 'hsl(' + hue + ', 65%, 44%)';
}

function debounce(fn, ms) {
  let t;
  return function() {
    const args = arguments;
    clearTimeout(t);
    t = setTimeout(function() { fn.apply(null, args); }, ms);
  };
}

function directChild(el, tag) {
  for (const c of el.children) if (c.tagName === tag) return c;
  return null;
}
function tagText(el, tag) {
  const n = el.getElementsByTagName(tag)[0];
  return n ? n.textContent : null;
}

function fmtDate(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const p = (n) => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}
function daysBetween(laterMs, earlierMs) {
  return Math.floor((laterMs - earlierMs) / 86400000);
}

// ── parse.js ─────────────────────────────────────────────────────────────────

const PARSER = new DOMParser();
let OPTS = { alts: true, tags: true, gosp: true };

const BLOCKS = [
  { open: /<StopPlace[\s>]/,         close: '</StopPlace>',         handle: parseStop },
  { open: /<GroupOfStopPlaces[\s>]/, close: '</GroupOfStopPlaces>', handle: parseGosp },
  { open: /<TopographicPlace[\s>]/,  close: '</TopographicPlace>',  handle: parseTopo },
];

function newModel() {
  return {
    publishedAt: null,
    topo:  new Map(),
    stops: new Map(),
    gosps: [],
  };
}

async function parseNetex(file, onProgress, opts) {
  OPTS = Object.assign({ alts: true, tags: true, gosp: true, history: true }, opts || {});
  const model = newModel();
  const decoder = new TextDecoder('utf-8');
  let offset = 0, buffer = '', gotTs = false;

  while (offset < file.size) {
    const end = Math.min(offset + CONFIG.chunkSize, file.size);
    const ab = await file.slice(offset, end).arrayBuffer();
    offset = end;
    buffer += decoder.decode(ab, { stream: true });
    if (!gotTs) {
      const m = /<PublicationTimestamp>([^<]+)/.exec(buffer);
      if (m) { model.publishedAt = m[1]; gotTs = true; }
    }
    buffer = drain(buffer, model, false);
    if (onProgress) onProgress(offset / file.size, model);
    await new Promise(function(r) { setTimeout(r); });
  }
  buffer += decoder.decode();
  drain(buffer, model, true);
  return model;
}

function parseString(text, opts) {
  OPTS = Object.assign({ alts: true, tags: true, gosp: true, history: true }, opts || {});
  const model = newModel();
  const m = /<PublicationTimestamp>([^<]+)/.exec(text);
  if (m) model.publishedAt = m[1];
  drain(text, model, true);
  return model;
}

function earliestOpen(buffer) {
  let best = null;
  for (const b of BLOCKS) {
    const m = b.open.exec(buffer);
    if (m && (best === null || m.index < best.idx)) best = { idx: m.index, b };
  }
  return best;
}

function drain(buffer, model, final) {
  while (true) {
    const hit = earliestOpen(buffer);
    if (!hit) return final ? '' : buffer.slice(Math.max(0, buffer.length - 24));
    const start = hit.idx;
    const closeIdx = buffer.indexOf(hit.b.close, start);
    if (closeIdx === -1) return final ? '' : buffer.slice(start);
    const end = closeIdx + hit.b.close.length;
    try { hit.b.handle(buffer.slice(start, end), model); } catch (_) {}
    buffer = buffer.slice(end);
  }
}

function parseTopo(block, model) {
  const idM = /\sid="([^"]+)"/.exec(block);
  if (!idM) return;
  const id = idM[1];
  const type = ((/<TopographicPlaceType>([^<]+)/.exec(block) || [])[1] || '').trim();
  const name = decodeEntities(((/<Descriptor>\s*<Name[^>]*>([^<]+)/.exec(block) || [])[1] || '')).trim();
  const parentRef = (/<ParentTopographicPlaceRef ref="([^"]+)"/.exec(block) || [])[1] || null;
  const countryRef = (/<CountryRef ref="([^"]+)"/.exec(block) || [])[1] || null;
  model.topo.set(id, { ref: id, name, type, parentRef, countryRef });
}

function coordOf(parent) {
  const cen = directChild(parent, 'Centroid');
  if (!cen) return null;
  const lat = parseFloat(tagText(cen, 'Latitude'));
  const lon = parseFloat(tagText(cen, 'Longitude'));
  return (Number.isFinite(lat) && Number.isFinite(lon)) ? [lat, lon] : null;

function parseGosp(block, model) {
  if (!OPTS.gosp) return;
  const doc = PARSER.parseFromString(block, 'application/xml');
  if (doc.getElementsByTagName('parsererror').length) return;
  const g = doc.documentElement;
  if (!g || g.tagName !== 'GroupOfStopPlaces') return;
  const id = g.getAttribute('id');
  if (!id) return;
  const nameEl = directChild(g, 'Name');
  const memberRefs = [];
  const mem = directChild(g, 'members');
  if (mem) for (const r of mem.children) {
    if (r.tagName === 'StopPlaceRef') { const ref = r.getAttribute('ref'); if (ref) memberRefs.push(ref); }
  }
  model.gosps.push({
    id,
    name: nameEl ? nameEl.textContent.trim() : id,
    purpose: (directChild(g, 'PurposeOfGroupingRef') || { getAttribute: function() { return null; } }).getAttribute('ref') || null,
    centroid: coordOf(g),

}

function parseStop(block, model) {
  const doc = PARSER.parseFromString(block, 'application/xml');
  if (doc.getElementsByTagName('parsererror').length) return;
  const sp = doc.documentElement;
  if (!sp || sp.tagName !== 'StopPlace') return;
  const id = sp.getAttribute('id');
  if (!id) return;

  const nameEl = directChild(sp, 'Name');
  const name = nameEl ? nameEl.textContent.trim() : id;
  const lang = nameEl ? (nameEl.getAttribute('lang') || '') : '';
  const topoRefEl = directChild(sp, 'TopographicPlaceRef');
  const topoRef = topoRefEl ? topoRefEl.getAttribute('ref') : null;
  const parentRefEl = directChild(sp, 'ParentSiteRef');
  const parentRef = parentRefEl ? parentRefEl.getAttribute('ref') : null;

  const version = Number(sp.getAttribute('version')) || null;
  const created = Date.parse(sp.getAttribute('created') || '') || null;
  const changed = Date.parse(sp.getAttribute('changed') || '') || null;

  const vb = directChild(sp, 'ValidBetween');
  const fromDateRaw = vb ? tagText(vb, 'FromDate') : null;
  const fromDate = fromDateRaw ? (Date.parse(fromDateRaw) || null) : null;
  const toDateRaw = vb ? tagText(vb, 'ToDate') : null;
  const expired = !!(toDateRaw && new Date(toDateRaw) < new Date());

  const tmEl = directChild(sp, 'TransportMode');
  const transportMode = tmEl ? tmEl.textContent.toLowerCase().trim() : '';

  let isParent = false;
  let versionComment = '';
  const tagsByIdx = {};
  const kl = directChild(sp, 'keyList');
  if (kl) for (const kv of kl.children) {
    if (kv.tagName !== 'KeyValue') continue;
    const k = (tagText(kv, 'Key') || '');
    if (k === 'IS_PARENT_STOP_PLACE') {
      const valEl = kv.getElementsByTagName('Value')[0];
      isParent = (valEl ? valEl.textContent : '').trim() === 'true';
      continue;
    }
    if (k === 'VERSION_COMMENT' && OPTS.history) {
      const valEl = kv.getElementsByTagName('Value')[0];
      versionComment = valEl ? valEl.textContent.trim() : '';
      continue;
    }
    if (!OPTS.tags) continue;
    const m = /^TAG-(\d+)-(\w+)$/.exec(k);
    if (m) {
      if (!tagsByIdx[m[1]]) tagsByIdx[m[1]] = {};
      const valEl = kv.getElementsByTagName('Value')[0];
      tagsByIdx[m[1]][m[2]] = valEl ? valEl.textContent : '';
    }
  }

  const alts = [];
  const ac = OPTS.alts ? directChild(sp, 'alternativeNames') : null;
  if (ac) for (const an of ac.children) {
    if (an.tagName !== 'AlternativeName') continue;
    const nm = an.getElementsByTagName('Name')[0];
    const raw = nm ? (nm.textContent || '') : '';
    alts.push({
      type: (tagText(an, 'NameType') || 'other').trim(),
      name: raw.trim(),
      raw,
      lang: nm ? (nm.getAttribute('lang') || '') : '',
    });
  }

  const tags = Object.values(tagsByIdx).map(function(t) {
    return {
      name: (t.name || '').trim(),
      comment: (t.comment || '').trim(),
      created: t.created ? Number(t.created) : null,
      removed: t.removed ? Number(t.removed) : null,
      idReference: t.idReference || '',
    };
  }).filter(function(t) { return t.name || t.comment; });

  model.stops.set(id, { id, name, lang, coord: coordOf(sp), topoRef, parentRef, isParent, toDateRaw, expired, alts, tags, version, created, changed, fromDate, transportMode, versionComment });
}

function resolveRegions(model) {
  for (const s of model.stops.values()) {
    let muni = null, county = null, cur = s.topoRef ? model.topo.get(s.topoRef) : null, guard = 0;
    while (cur && guard++ < 6) {
      if (!muni && cur.type === 'municipality') muni = cur;
      if (!county && cur.type === 'county') county = cur;
      cur = cur.parentRef ? model.topo.get(cur.parentRef) : null;
    }
    s.muni = muni ? { ref: muni.ref, name: muni.name } : null;
    s.county = county ? { ref: county.ref, name: county.name } : null;
  }

  const counties = new Map();
  let unknown = 0;
  for (const s of model.stops.values()) {
    if (!s.county) { unknown++; continue; }
    let c = counties.get(s.county.ref);
    if (!c) { c = { ref: s.county.ref, name: s.county.name, count: 0, munis: new Map() }; counties.set(c.ref, c); }
    c.count++;
    if (s.muni) {
      let m = c.munis.get(s.muni.ref);
      if (!m) { m = { ref: s.muni.ref, name: s.muni.name, count: 0 }; c.munis.set(m.ref, m); }
      m.count++;
    }
  }
  const byName = (a, b) => a.name.localeCompare(b.name, 'no');
  const countyList = Array.from(counties.values())
    .map(function(c) { return { ref: c.ref, name: c.name, count: c.count, munis: Array.from(c.munis.values()).sort(byName) }; })
    .sort(byName);

  return { countyList, unknown };
}

function createRegionFilter() {
  let county = '', muni = '';
  return {
    set: function(c, m) { county = c; muni = m; },
    get: function() { return { county, muni }; },
    active: function() { return !!(county || muni); },
    matches: function(stop) {
      if (muni) return !!stop.muni && stop.muni.ref === muni;
      if (county) return !!stop.county && stop.county.ref === county;
      return true;
    },
  };
}

const BACKGROUNDS = {
  'Positron (pale)': {
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    opts: { subdomains: 'abcd', maxZoom: 19, attribution: 'OpenStreetMap, CARTO' },
  },
  'OpenStreetMap': {
    url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    opts: { maxZoom: 19, attribution: 'OpenStreetMap contributors' },
  },
};

function createMap(elId) {
  const map = L.map(elId, { preferCanvas: true }).setView([64.5, 16.5], 5);
  const layers = {};
  for (const name of Object.keys(BACKGROUNDS)) {
    const def = BACKGROUNDS[name];
    layers[name] = L.tileLayer(def.url, def.opts);
  }
  let current = Object.keys(BACKGROUNDS)[0];
  layers[current].addTo(map);

  return {
    map,
    backgrounds: Object.keys(BACKGROUNDS),
    setBackground: function(name) {
      if (!layers[name] || name === current) return;
      map.removeLayer(layers[current]);
      layers[name].addTo(map);
      current = name;
    },
    fit: function(coords) {
      const pts = coords.filter(Boolean);
      if (pts.length === 1) map.setView(pts[0], 13);
      else if (pts.length > 1) map.fitBounds(pts, { padding: [40, 40] });
    },
  };
}
