      const ev = a.eval, lang = a.lang ? '<span class="si-lang">(' + escHtml(a.lang) + ')</span>' : '';
      const rating = a.type === 'alias'
        ? '<span class="alt-rating" title="' + escHtml(ratingTitle(ev)) + '">' + ratingGlyph(ev) + '<span class="alt-pct">' + Math.round(ev.confidence * 100) + '%</span></span>'
        : '';
      return '<div class="alt-line">' + rating + '<span class="si-alt-name">' + escHtml(a.name) + '</span>' + lang + flagsHtml(ev) + '</div>';
    }).join('');
    return '<div class="si-alt"><span class="si-type-tag" style="background:' + typeColor(type) + '">' + escHtml(type) + '</span><div class="alt-lines">' + lines + '</div></div>';
  }).join('');
}

const altnames = {
  id: 'altnames',
  label: 'AlternativeNames',

  mount: function(ctx) {
    this.ctx = ctx;
    this.typeF = new Set(); this.langF = new Set(); this.issueF = new Set();
    this.sort = 'confidence'; this.mapMode = 'type'; this.activeId = null; this._regionKey = null;
    this.markers = new Map();

    const idx = new Map();
    const add = function(muniRef, name, id, raw) {
      if (!muniRef) return; const n = norm(name); if (!n) return;
      let b = idx.get(muniRef); if (!b) idx.set(muniRef, b = new Map());
      let arr = b.get(n); if (!arr) b.set(n, arr = []); arr.push({ id, raw });
    };
    for (const s of ctx.model.stops.values()) {
      const mr = s.muni ? s.muni.ref : null;
      add(mr, s.name, s.id, s.name);
      for (const a of s.alts) add(mr, a.name, s.id, a.name);
    }

    this.items = [];
    for (const s of ctx.model.stops.values()) {
      if (!s.alts.length) continue;
      let maxConf = 0, flagged = false;
      const bucket = idx.get(s.muni ? s.muni.ref : null);
      const altsEval = s.alts.map(function(a) {
        const isAlias = a.type === 'alias';
        const useless = isAlias ? scoreUseless(s.name, a.name) : 0;
        const unhelpful = isAlias ? scoreUnhelpful(s.name, a.name) : 0;
        const confidence = noisyOr([useless, unhelpful]);
        const malformed = malformedFlags(a.raw);
        const collision = [];
        const arr = bucket ? bucket.get(norm(a.name)) : null;
        if (arr) { const seen = new Set(); for (const e of arr) if (e.id !== s.id && !seen.has(e.id)) { seen.add(e.id); collision.push(e); } }
        if (confidence > maxConf) maxConf = confidence;
        if (malformed.length || collision.length) flagged = true;
        return Object.assign({}, a, { eval: { useless, unhelpful, confidence, malformed, collision } });
      });
      const types = orderTypes(new Set(altsEval.map(function(a) { return a.type; })));
      const langs = Array.from(new Set(altsEval.map(function(a) { return a.lang; }).filter(Boolean))).sort();
      this.items.push({
        stop: s, alts: altsEval, types, langs, confidence: maxConf, flagged,
        search: [s.name, s.id].concat(altsEval.map(function(a) { return a.name; })).join(' ').toLowerCase(),
      });
    }

    ctx.pane.innerHTML =
      '<div class="pane-top">'
      + '<div class="pane-title"><span>Stops with alternative names</span><span class="pane-count" id="an-count">—</span></div>'
      + '<div id="an-summary"></div>'
      + '<input id="an-search" type="text" placeholder="Filter by name, ID or alt-name…" autocomplete="off"/>'
      + '<div class="pane-controls">'
      + '<label class="ctl">Sort'
      + '<select id="an-sort">'
      + '<option value="confidence">Issue confidence</option>'
      + '<option value="flagged">Flagged first</option>'
      + '<option value="name">Name</option>'
      + '</select></label>'
      + '<div class="map-mode" id="an-mapmode">'
      + '<button data-mode="type" class="active">Type</button>'
      + '<button data-mode="issue">Issue</button>'
      + '</div></div></div>'
      + '<div class="pane-list" id="an-list"></div>';

    const self = this;
    ctx.pane.querySelector('#an-search').addEventListener('input', debounce(function() { self.render(); }, 150));
    ctx.pane.querySelector('#an-sort').addEventListener('change', function(e) { self.sort = e.target.value; self.renderList(); });
    ctx.pane.querySelector('#an-summary').addEventListener('click', function(e) { self.onCard(e); });
    ctx.pane.querySelector('#an-mapmode').addEventListener('click', function(e) {
      const b = e.target.closest('button'); if (!b || b.dataset.mode === self.mapMode) return;
      self.mapMode = b.dataset.mode;
      ctx.pane.querySelectorAll('#an-mapmode button').forEach(function(x) { x.classList.toggle('active', x.dataset.mode === self.mapMode); });
      self.renderMarkers();
    });
  },

  onCard: function(e) {
    const pill = e.target.closest('.sum-pill'); if (!pill) return;
    const set = pill.dataset.cat === 'type' ? this.typeF : pill.dataset.cat === 'lang' ? this.langF : this.issueF;
    const v = pill.dataset.val;
    if (set.has(v)) set.delete(v); else set.add(v);
    this.render();
  },

  inRegion: function() {
    const self = this;
    return this.items.filter(function(it) { return self.ctx.region.matches(it.stop); });
  },

  visible: function() {
    const self = this;
    const q = this.ctx.pane.querySelector('#an-search').value.toLowerCase();
    return this.inRegion().filter(function(it) {
      if (q && !it.search.includes(q)) return false;
      if (self.typeF.size && !it.types.some(function(t) { return self.typeF.has(t); })) return false;
      if (self.langF.size && !it.langs.some(function(l) { return self.langF.has(l); })) return false;
      if (self.issueF.size) {
        const ok = Array.from(self.issueF).some(function(f) {
          return (f === 'high' && it.confidence >= AN_RULES.highConfidence)
            || (f === 'malformed' && it.alts.some(function(a) { return a.eval.malformed.length; }))
            || (f === 'collision' && it.alts.some(function(a) { return a.eval.collision.length; }));
        });
        if (!ok) return false;
      }
      return true;
    });
  },

  render: function() {
    this.renderSummary();
    this.renderList();
    this.renderMarkers();
    const key = JSON.stringify(this.ctx.region.get());
    if (key !== this._regionKey) {
      this._regionKey = key;
      const pts = this.visible().map(function(it) { return it.stop.coord; }).filter(Boolean);
      if (pts.length) this.ctx.map.fit(pts);
    }
  },

  renderSummary: function() {
    const region = this.inRegion();
    const typeCount = {}, langCount = {};
    let nHigh = 0, nMal = 0, nCol = 0;
    for (const it of region) {
      for (const t of it.types) typeCount[t] = (typeCount[t] || 0) + 1;
      for (const l of it.langs) langCount[l] = (langCount[l] || 0) + 1;
      if (it.confidence >= AN_RULES.highConfidence) nHigh++;
      if (it.alts.some(function(a) { return a.eval.malformed.length; })) nMal++;
      if (it.alts.some(function(a) { return a.eval.collision.length; })) nCol++;
    }
    const self = this;
    const pill = function(cat, val, label, swatch, count, active) {
      return '<span class="sum-pill' + (active ? ' active' : '') + '" data-cat="' + cat + '" data-val="' + escHtml(val) + '">'
        + (swatch ? '<span class="sum-swatch" style="background:' + swatch + '"></span>' : '')
        + escHtml(label) + ' ' + count.toLocaleString() + '</span>';
    };
    const issue = pill('issue', 'high', 'high confidence', confColor(0.8), nHigh, this.issueF.has('high'))
      + pill('issue', 'malformed', 'malformed', THEME.warn, nMal, this.issueF.has('malformed'))
      + pill('issue', 'collision', 'collision', THEME.danger, nCol, this.issueF.has('collision'));
    const types = orderTypes(Object.keys(typeCount)).map(function(t) { return pill('type', t, t, typeColor(t), typeCount[t], self.typeF.has(t)); }).join('');
    const langs = Object.keys(langCount).sort().map(function(l) { return pill('lang', l, l || '-', null, langCount[l], self.langF.has(l)); }).join('');
    this.ctx.pane.querySelector('#an-summary').innerHTML =
      '<div class="sum-label">By issue</div><div class="sum-row">' + issue + '</div>'
      + '<div class="sum-label">By type</div><div class="sum-row">' + types + '</div>'
      + '<div class="sum-label">By language</div><div class="sum-row">' + langs + '</div>';
  },

  sorted: function(items) {
    const a = items.slice();
    if (this.sort === 'name') a.sort(function(x, y) { return x.stop.name.localeCompare(y.stop.name, 'no'); });
    else if (this.sort === 'flagged') a.sort(function(x, y) { return (Number(y.flagged) - Number(x.flagged)) || (y.confidence - x.confidence); });
    else a.sort(function(x, y) { return y.confidence - x.confidence; });
    return a;
  },

  renderList: function() {
    const vis = this.sorted(this.visible());
    this.ctx.pane.querySelector('#an-count').textContent = vis.length.toLocaleString() + ' / ' + this.inRegion().length.toLocaleString();
    const list = this.ctx.pane.querySelector('#an-list');
    list.innerHTML = '';
    const CAP = 400;
    const self = this;
    vis.slice(0, CAP).forEach(function(it) {
      const div = document.createElement('div');
      div.className = 'stop-item' + (it.stop.id === self.activeId ? ' active' : '');
      div.dataset.id = it.stop.id;
      const href = CONFIG.nsrStopUrl.replace('{id}', it.stop.id);
      let safe = '#'; try { if (new URL(href).protocol === 'https:') safe = href; } catch (_) {}
      div.innerHTML =
        '<div class="si-name">' + pieDot(it.types) + escHtml(it.stop.name)
        + '<a class="si-nsr-link" href="' + escHtml(safe) + '" target="_blank" rel="noopener">' + escHtml(CONFIG.nsrLinkLabel) + '</a></div>'
        + '<div class="si-id">' + escHtml(it.stop.id) + '</div>' + breakdownHtml(it);
      div.querySelector('.si-nsr-link').addEventListener('click', function(e) { e.stopPropagation(); });
      div.addEventListener('click', function() { self.select(it, false); });
      list.appendChild(div);
    });
    if (vis.length > CAP) {
      const m = document.createElement('div');
      m.className = 'list-more';
      m.textContent = 'Showing first ' + CAP + ' of ' + vis.length.toLocaleString() + ' — narrow the filter.';
      list.appendChild(m);
    }
  },

  renderMarkers: function() {
    const layer = this.ctx.layer;
    const self = this;
    layer.eachLayer(function(l) { l.off(); }); layer.clearLayers(); this.markers.clear();
    for (const it of this.visible()) {
      if (!it.stop.coord) continue;
      const m = L.marker(it.stop.coord, { icon: anStopIcon(it, it.stop.id === this.activeId, this.mapMode) })
        .addTo(layer)
        .bindTooltip(it.stop.name, { direction: 'top', offset: [0, -8] })
        .bindPopup('<div class="lp"><div class="lp-title">' + escHtml(it.stop.name) + '</div><div class="lp-id">' + escHtml(it.stop.id) + '</div>' + breakdownHtml(it) + '</div>');
      m.on('click', function() { self.select(it, true); });
      this.markers.set(it.stop.id, m);
    }
  },

  select: function(it, fromMap) {
    const self = this;
    const prev = this.activeId;
    this.activeId = it.stop.id;
    if (prev && this.markers.has(prev)) { const p = this.items.find(function(x) { return x.stop.id === prev; }); if (p) this.markers.get(prev).setIcon(anStopIcon(p, false, this.mapMode)); }
    const m = this.markers.get(it.stop.id);
    if (m) { m.setIcon(anStopIcon(it, true, this.mapMode)); m.setZIndexOffset(1000); }
    this.ctx.pane.querySelectorAll('.stop-item.active').forEach(function(el) { el.classList.remove('active'); });
    const row = this.ctx.pane.querySelector('.stop-item[data-id="' + CSS.escape(it.stop.id) + '"]');
    if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    if (it.stop.coord) { if (!fromMap) this.ctx.map.map.setView(it.stop.coord, Math.max(this.ctx.map.map.getZoom(), 13), { animate: true }); if (m) m.openPopup(); }
  },
};

// ── tools/tags.js ────────────────────────────────────────────────────────────

const TG_RULES = {
  ageFullDays: 1095,
};
const TG_PALETTE = ['#6f42c1', '#0d6efd', '#fd7e14', '#20c997', '#e83e8c', '#17a2b8', '#fab005', '#495057'];

function tgAgeText(days) {
  if (days < 1) return 'today';
  if (days < 60) return days + 'd';
  if (days < 730) return Math.floor(days / 30.44) + 'mnd';
  return (days / 365.25).toFixed(1) + 'y';
}

const tags = {
  id: 'tags',
  label: 'Tags',

  mount: function(ctx) {
    this.ctx = ctx;
    this.nameF = new Set();
    this.sort = 'oldest';
    this.activeId = null;
    this._regionKey = null;
    this.markers = new Map();

    const now = ctx.model.publishedAt ? Date.parse(ctx.model.publishedAt) : Date.now();
    this.now = Number.isFinite(now) ? now : Date.now();

    const names = new Set();
    this.items = [];
    for (const s of ctx.model.stops.values()) {
      if (!s.tags.length) continue;
      const tgTags = s.tags.map(function(t) {
        const open = !t.removed;
        const ageDays = t.created ? Math.floor((this.now - t.created) / 86400000) : null;
        names.add(t.name);
        return Object.assign({}, t, { open, ageDays });
      }, this);
      const openTags = tgTags.filter(function(t) { return t.open; });
      const oldestOpen = openTags.reduce(function(min, t) { return (t.created && (min === null || t.created < min) ? t.created : min); }, null);
      const severity = oldestOpen ? Math.min(1, Math.floor((this.now - oldestOpen) / 86400000) / TG_RULES.ageFullDays) : 0;
      this.items.push({
        stop: s, tags: tgTags, openTags, oldestOpen, severity,
        names: new Set(openTags.map(function(t) { return t.name; })),
        search: [s.name, s.id].concat(tgTags.map(function(t) { return t.name + ' ' + t.comment; })).join(' ').toLowerCase(),
      });
    }
    this.nameColor = {};
    Array.from(names).sort().forEach(function(n, i) { this.nameColor[n] = TG_PALETTE[i % TG_PALETTE.length]; }, this);

    ctx.pane.innerHTML =
      '<div class="pane-top">'
      + '<div class="pane-title"><span>Stops with open tags</span><span class="pane-count" id="tg-count">—</span></div>'
      + '<div id="tg-stats" class="tg-stats"></div>'
      + '<div class="sum-label">By tag</div><div class="sum-row" id="tg-names"></div>'
      + '<input id="tg-search" type="text" placeholder="Filter by name, ID or comment…" autocomplete="off"/>'
      + '<label class="ctl">Sort'
      + '<select id="tg-sort">'
      + '<option value="oldest">Oldest open first</option>'
      + '<option value="newest">Newest open first</option>'
      + '<option value="name">Name</option>'
      + '</select></label></div>'
      + '<div class="pane-list" id="tg-list"></div>';

    const self = this;
    ctx.pane.querySelector('#tg-search').addEventListener('input', debounce(function() { self.render(); }, 150));
    ctx.pane.querySelector('#tg-sort').addEventListener('change', function(e) { self.sort = e.target.value; self.renderList(); });
    ctx.pane.querySelector('#tg-names').addEventListener('click', function(e) {
      const pill = e.target.closest('.sum-pill'); if (!pill) return;
      const v = pill.dataset.val;
      if (self.nameF.has(v)) self.nameF.delete(v); else self.nameF.add(v);
      self.render();
    });
  },

  inRegion: function() {
    const self = this;
    return this.items.filter(function(it) { return it.openTags.length && self.ctx.region.matches(it.stop); });
  },

  visible: function() {
    const self = this;
    const q = this.ctx.pane.querySelector('#tg-search').value.toLowerCase();
    return this.inRegion().filter(function(it) {
      if (q && !it.search.includes(q)) return false;
      if (self.nameF.size && !Array.from(it.names).some(function(n) { return self.nameF.has(n); })) return false;
      return true;
    });
  },

  render: function() {
    this.renderStats();
    this.renderList();
    this.renderMarkers();
    const key = JSON.stringify(this.ctx.region.get());
    if (key !== this._regionKey) {
      this._regionKey = key;
      const pts = this.visible().map(function(it) { return it.stop.coord; }).filter(Boolean);
      if (pts.length) this.ctx.map.fit(pts);
    }
  },

  renderStats: function() {
    const region = this.inRegion();
    let openTags = 0, resolved = 0, oldest = null;
    const nameCount = {};
    for (const it of region) {
      openTags += it.openTags.length;
      for (const t of it.tags) {
        if (t.open) { nameCount[t.name] = (nameCount[t.name] || 0) + 1; if (t.created && (oldest === null || t.created < oldest)) oldest = t.created; }
        else resolved++;
      }
    }
    const oldestDays = oldest ? Math.floor((this.now - oldest) / 86400000) : 0;
    this.ctx.pane.querySelector('#tg-stats').innerHTML =
      '<div class="stat-grid compact">'
      + '<div class="stat-card"><div class="stat-num">' + region.length.toLocaleString() + '</div><div class="stat-lbl">stops, open tags</div></div>'
      + '<div class="stat-card"><div class="stat-num">' + openTags.toLocaleString() + '</div><div class="stat-lbl">open tags</div></div>'
      + '<div class="stat-card"><div class="stat-num">' + tgAgeText(oldestDays) + '</div><div class="stat-lbl">oldest open</div></div>'
      + '<div class="stat-card"><div class="stat-num">' + resolved.toLocaleString() + '</div><div class="stat-lbl">resolved tags</div></div>'
      + '</div>';
    const self = this;
    const pills = Object.keys(nameCount).sort().map(function(n) {
      return '<span class="sum-pill' + (self.nameF.has(n) ? ' active' : '') + '" data-val="' + escHtml(n) + '">'
        + '<span class="sum-swatch" style="background:' + self.nameColor[n] + '"></span>' + escHtml(n) + ' ' + nameCount[n].toLocaleString() + '</span>';
    }).join('');
    this.ctx.pane.querySelector('#tg-names').innerHTML = pills || '<span class="muted">none</span>';
  },

  sorted: function(items) {
    const a = items.slice();
    if (this.sort === 'name') a.sort(function(x, y) { return x.stop.name.localeCompare(y.stop.name, 'no'); });
    else if (this.sort === 'newest') a.sort(function(x, y) { return (y.oldestOpen || 0) - (x.oldestOpen || 0); });
    else a.sort(function(x, y) { return (x.oldestOpen || Infinity) - (y.oldestOpen || Infinity); });
    return a;
  },

  tagLineHtml: function(t) {
    const age = t.ageDays != null ? '<span class="tg-age">' + tgAgeText(t.ageDays) + '</span>' : '';
    const date = t.created ? '<span class="si-lang">' + fmtDate(t.created) + '</span>' : '';
    const status = t.open ? '' : '<span class="tg-resolved">resolved ' + (t.removed ? fmtDate(t.removed) : '') + '</span>';
    return '<div class="tg-line">'
      + '<span class="tg-name" style="background:' + (this.nameColor[t.name] || '#888') + '">' + escHtml(t.name) + '</span>'
      + age + date + status
      + (t.comment ? '<div class="tg-comment">' + escHtml(t.comment) + '</div>' : '')
      + '</div>';
  },

  renderList: function() {
    const vis = this.sorted(this.visible());
    this.ctx.pane.querySelector('#tg-count').textContent = vis.length.toLocaleString() + ' / ' + this.inRegion().length.toLocaleString();
    const list = this.ctx.pane.querySelector('#tg-list');
    list.innerHTML = '';
    const CAP = 400;
    const self = this;
    vis.slice(0, CAP).forEach(function(it) {
      const div = document.createElement('div');
      div.className = 'stop-item' + (it.stop.id === self.activeId ? ' active' : '');
      div.dataset.id = it.stop.id;
      const href = CONFIG.nsrStopUrl.replace('{id}', it.stop.id);
      let safe = '#'; try { if (new URL(href).protocol === 'https:') safe = href; } catch (_) {}
      const tgTagsSorted = it.tags.slice().sort(function(a, b) { return (Number(b.open) - Number(a.open)) || ((a.created || 0) - (b.created || 0)); });
      div.innerHTML =
        '<div class="si-name"><span class="tg-dot" style="background:' + confColor(it.severity) + '"></span>' + escHtml(it.stop.name)
        + '<a class="si-nsr-link" href="' + escHtml(safe) + '" target="_blank" rel="noopener">' + escHtml(CONFIG.nsrLinkLabel) + '</a></div>'
        + '<div class="si-id">' + escHtml(it.stop.id) + '</div>'
        + tgTagsSorted.map(function(t) { return self.tagLineHtml(t); }).join('');
      div.querySelector('.si-nsr-link').addEventListener('click', function(e) { e.stopPropagation(); });
      div.addEventListener('click', function() { self.select(it, false); });
      list.appendChild(div);
    });
    if (vis.length > CAP) {
      const m = document.createElement('div'); m.className = 'list-more';
      m.textContent = 'Showing first ' + CAP + ' of ' + vis.length.toLocaleString() + ' — narrow the filter.';
      list.appendChild(m);
    }
  },

  tgIcon: function(it, active) {
    const r = active ? 11 : 8, sw = active ? 2.5 : 1.5, size = r * 2 + sw * 2 + 4, c = size / 2;
    return L.divIcon({
      className: '', iconSize: [size, size], iconAnchor: [c, c], zIndexOffset: active ? 1000 : 0,
      html: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" xmlns="http://www.w3.org/2000/svg"><circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="' + confColor(it.severity) + '" stroke="' + (active ? '#1a1a2e' : 'rgba(0,0,0,0.35)') + '" stroke-width="' + sw + '"/></svg>',
    });
  },

  popupHtml: function(it) {
    const self = this;
    return '<div class="lp"><div class="lp-title">' + escHtml(it.stop.name) + '</div><div class="lp-id">' + escHtml(it.stop.id) + '</div>'
      + it.tags.slice().sort(function(a, b) { return Number(b.open) - Number(a.open); }).map(function(t) { return self.tagLineHtml(t); }).join('') + '</div>';
  },

  renderMarkers: function() {
    const layer = this.ctx.layer;
    const self = this;
    layer.eachLayer(function(l) { l.off(); }); layer.clearLayers(); this.markers.clear();
    for (const it of this.visible()) {
      if (!it.stop.coord) continue;
      const m = L.marker(it.stop.coord, { icon: self.tgIcon(it, it.stop.id === self.activeId) })
        .addTo(layer)
        .bindTooltip(it.stop.name, { direction: 'top', offset: [0, -8] })
        .bindPopup(self.popupHtml(it));
      m.on('click', function() { self.select(it, true); });
      self.markers.set(it.stop.id, m);
    }
  },

  select: function(it, fromMap) {
    const self = this;
    const prev = this.activeId;
    this.activeId = it.stop.id;
    if (prev && this.markers.has(prev)) { const p = this.items.find(function(x) { return x.stop.id === prev; }); if (p) this.markers.get(prev).setIcon(this.tgIcon(p, false)); }
    const m = this.markers.get(it.stop.id);
    if (m) { m.setIcon(this.tgIcon(it, true)); m.setZIndexOffset(1000); }
    this.ctx.pane.querySelectorAll('.stop-item.active').forEach(function(el) { el.classList.remove('active'); });
    const row = this.ctx.pane.querySelector('.stop-item[data-id="' + CSS.escape(it.stop.id) + '"]');
    if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    if (it.stop.coord) { if (!fromMap) this.ctx.map.map.setView(it.stop.coord, Math.max(this.ctx.map.map.getZoom(), 13), { animate: true }); if (m) m.openPopup(); }
  },
};

// ── tools/gosp.js ────────────────────────────────────────────────────────────

const POG_PALETTE = ['#6f42c1', '#0d6efd', '#fd7e14', '#20c997'];

function gospValidate(stop) {
  const reasons = [];
  if (!stop) return { ok: false, reasons: ['Member not found in file'] };
  if (stop.expired) reasons.push('Expired ' + (stop.toDateRaw || '').slice(0, 10));
  if (!stop.isParent && stop.parentRef) reasons.push('Monomodal child');
  return { ok: reasons.length === 0, reasons };
}

const gosp = {
  id: 'gosp',
  label: 'GroupOfStopPlaces',

  mount: function(ctx) {
    this.ctx = ctx;
    this.errorsOnly = false;
    this.pogF = new Set();
    this.activeId = null;
    this._regionKey = null;
    this.markers = new Map();
    this.gospLayer = L.layerGroup();
    this.detailLayer = L.layerGroup();
    ctx.layer.addLayer(this.gospLayer);
    ctx.layer.addLayer(this.detailLayer);

    this.items = ctx.model.gosps.map(function(g) {
      const members = g.memberRefs.map(function(r) { return ctx.model.stops.get(r) || null; });
      const loaded = members.filter(Boolean);
      let ok = 0, bad = 0;
      for (const s of loaded) { if (gospValidate(s).ok) ok++; else bad++; }
      bad += members.length - loaded.length;
      return { gosp: g, members, ok, bad, search: [g.name, g.id].join(' ').toLowerCase() };
    });

    const pogs = Array.from(new Set(ctx.model.gosps.map(function(g) { return g.purpose || '—'; }))).sort();
    this.pogColor = {};
    pogs.forEach(function(p, i) { this.pogColor[p] = POG_PALETTE[i % POG_PALETTE.length]; }, this);

    ctx.pane.innerHTML =
      '<div class="pane-top">'
      + '<div class="pane-title"><span>Groups of stop places</span><span class="pane-count" id="gs-count">—</span></div>'
      + '<div class="sum-label">By purpose of grouping</div><div class="sum-row" id="gs-pog"></div>'
      + '<input id="gs-search" type="text" placeholder="Filter by name or ID…" autocomplete="off"/>'
      + '<button id="gs-errors" class="filter-toggle">⚠ Only groups with problems</button>'
      + '</div>'
      + '<div class="pane-list" id="gs-list"></div>';

    const self = this;
    ctx.pane.querySelector('#gs-search').addEventListener('input', debounce(function() { self.render(); }, 150));
    ctx.pane.querySelector('#gs-errors').addEventListener('click', function(e) {
      self.errorsOnly = !self.errorsOnly;
      e.target.classList.toggle('active', self.errorsOnly);
      self.render();
    });
    ctx.pane.querySelector('#gs-pog').addEventListener('click', function(e) {
      const pill = e.target.closest('.sum-pill'); if (!pill) return;
      const v = pill.dataset.val;
      if (self.pogF.has(v)) self.pogF.delete(v); else self.pogF.add(v);
      self.render();
    });
  },

  matchesRegion: function(it) {
    if (!this.ctx.region.active()) return true;
    return it.members.some(function(s) { return s && this.ctx.region.matches(s); }, this);
  },

  inRegion: function() {
    const self = this;
    return this.items.filter(function(it) { return self.matchesRegion(it); });
  },

  visible: function() {
    const self = this;
    const q = this.ctx.pane.querySelector('#gs-search').value.toLowerCase();
    return this.inRegion().filter(function(it) {
      if (q && !it.search.includes(q)) return false;
      if (self.pogF.size && !self.pogF.has(it.gosp.purpose || '—')) return false;
      if (self.errorsOnly && it.bad === 0) return false;
      return true;
    });
  },

  render: function() {
    this.renderPog();
    this.renderList();
    this.renderGospPins();
    const key = JSON.stringify(this.ctx.region.get());
    if (key !== this._regionKey) {
      this._regionKey = key;
      this.detailLayer.clearLayers(); this.activeId = null;
      const pts = this.visible().map(function(it) { return it.gosp.centroid; }).filter(Boolean);
      if (pts.length) this.ctx.map.fit(pts);
    }
  },

  renderPog: function() {
    const region = this.inRegion();
    const count = {};
    for (const it of region) { const p = it.gosp.purpose || '—'; count[p] = (count[p] || 0) + 1; }
    const self = this;
    this.ctx.pane.querySelector('#gs-pog').innerHTML = Object.keys(count).sort().map(function(p) {
      return '<span class="sum-pill' + (self.pogF.has(p) ? ' active' : '') + '" data-val="' + escHtml(p) + '">'
        + '<span class="sum-swatch" style="background:' + self.pogColor[p] + '"></span>' + escHtml(p) + ' ' + count[p].toLocaleString() + '</span>';
    }).join('');
  },

  renderList: function() {
    const vis = this.visible().sort(function(a, b) { return b.bad - a.bad || a.gosp.name.localeCompare(b.gosp.name, 'no'); });
    this.ctx.pane.querySelector('#gs-count').textContent = vis.length.toLocaleString() + ' / ' + this.inRegion().length.toLocaleString();
    const list = this.ctx.pane.querySelector('#gs-list');
    list.innerHTML = '';
    const CAP = 400;
    const self = this;
    vis.slice(0, CAP).forEach(function(it) {
      const g = it.gosp;
      const div = document.createElement('div');
      div.className = 'stop-item' + (g.id === self.activeId ? ' active' : '');
      div.dataset.id = g.id;
      const href = CONFIG.nsrGroupUrl.replace('{id}', g.id);
      let safe = '#'; try { if (new URL(href).protocol === 'https:') safe = href; } catch (_) {}
      const missing = it.members.length - it.members.filter(Boolean).length;
      div.innerHTML =
        '<div class="si-name"><span class="gi-pog-dot" style="background:' + self.pogColor[g.purpose || '—'] + '"></span>' + escHtml(g.name)
        + '<a class="si-nsr-link" href="' + escHtml(safe) + '" target="_blank" rel="noopener">' + escHtml(CONFIG.nsrLinkLabel) + '</a></div>'
        + '<div class="si-id">' + escHtml(g.id) + '</div>'
        + '<div class="gi-purpose">' + escHtml(g.purpose || '—') + '</div>'
        + '<div class="gi-stats">'
        + '<span class="badge b-total">' + it.members.length + ' stops</span>'
        + (it.ok ? '<span class="badge b-ok">✓ ' + it.ok + '</span>' : '')
        + (it.bad ? '<span class="badge b-bad">✗ ' + it.bad + '</span>' : '')
        + (missing ? '<span class="badge b-warn">? ' + missing + '</span>' : '')
        + '</div>';
      div.querySelector('.si-nsr-link').addEventListener('click', function(e) { e.stopPropagation(); });
      div.addEventListener('click', function() { self.select(it); });
      list.appendChild(div);
    });
    if (vis.length > CAP) {
      const m = document.createElement('div'); m.className = 'list-more';
      m.textContent = 'Showing first ' + CAP + ' of ' + vis.length.toLocaleString() + ' — narrow the filter.';
      list.appendChild(m);
    }
  },

  gospIcon: function(it, active) {
    const color = this.pogColor[it.gosp.purpose || '—'];
    const s = active ? 22 : 16, c = s / 2 + 2, size = s + 4;
    const bg = active ? color : color + 'cc';
    const border = active ? '3px solid #fff' : '2px solid rgba(255,255,255,0.85)';
    return L.divIcon({
      className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2], zIndexOffset: active ? 1000 : 0,
      html: '<div style="width:' + s + 'px;height:' + s + 'px;border-radius:50%;background:' + bg + ';border:' + border + ';box-shadow:0 1px 4px rgba(0,0,0,0.4);margin:2px"></div>',
    });
  },

  renderGospPins: function() {
    const self = this;
    this.gospLayer.eachLayer(function(l) { l.off(); }); this.gospLayer.clearLayers(); this.markers.clear();
    for (const it of this.visible()) {
      if (!it.gosp.centroid) continue;
      const m = L.marker(it.gosp.centroid, { icon: this.gospIcon(it, it.gosp.id === this.activeId) })
        .addTo(this.gospLayer)
        .bindTooltip(it.gosp.name, { direction: 'top', offset: [0, -6] });
      m.on('click', function() { self.select(it); });
      this.markers.set(it.gosp.id, m);
    }
  },

  select: function(it) {
    const self = this;
    const g = it.gosp;
    const prev = this.activeId; this.activeId = g.id;
    if (prev && this.markers.has(prev)) { const p = this.items.find(function(x) { return x.gosp.id === prev; }); if (p) this.markers.get(prev).setIcon(this.gospIcon(p, false)); }
    if (this.markers.has(g.id)) this.markers.get(g.id).setIcon(this.gospIcon(it, true));

    this.ctx.pane.querySelectorAll('.stop-item.active').forEach(function(el) { el.classList.remove('active'); });
    const row = this.ctx.pane.querySelector('.stop-item[data-id="' + CSS.escape(g.id) + '"]');
    if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

    this.detailLayer.clearLayers();
    const bounds = g.centroid ? [g.centroid] : [];
    it.members.forEach(function(s) {
      if (!s || !s.coord) return;
      bounds.push(s.coord);
      const v = gospValidate(s);
      const color = v.ok ? THEME.ok : THEME.danger;
      if (g.centroid) L.polyline([g.centroid, s.coord], { color: color, weight: 2.5, opacity: 0.55, dashArray: '7 5' }).addTo(self.detailLayer);
      L.marker(s.coord, {
        icon: L.divIcon({ className: '', iconSize: [14, 14], iconAnchor: [7, 7], html: '<div style="width:14px;height:14px;border-radius:50%;background:' + color + ';border:2.5px solid rgba(0,0,0,0.4)"></div>' }),
      }).addTo(self.detailLayer)
        .bindPopup('<div class="lp"><div class="lp-title">' + escHtml(s.name) + '</div><div class="lp-id">' + escHtml(s.id) + '</div>'
          + (v.ok ? '<div class="lp-ok">✓ Approved member</div>' : '<div class="lp-bad">✗ ' + v.reasons.map(escHtml).join(', ') + '</div>') + '</div>');
    });
    if (bounds.length > 1) this.ctx.map.map.fitBounds(bounds, { padding: [55, 55], maxZoom: 14 });
    else if (bounds.length === 1) this.ctx.map.map.setView(bounds[0], 13);
  },
};

// ── tools/names.js ───────────────────────────────────────────────────────────

const NAME_ISSUE_META = {
  SPECIAL:   { label: 'Special char',  color: '#e63946' },
  DUPLICATE: { label: 'Duplicate within municipality', color: '#7209b7' },
  ABBREV:    { label: 'Abbreviation?', color: '#fd7e14' },
  LONGFORM:  { label: 'Use abbrev.',   color: '#e9c46a' },
};

const NAME_ALLOWED_ABBREVS = new Set(['vgs.', 'rv.', 'fv.', 'kv.']);
// These commonly appear in official place names — flag at lower confidence
const NAME_TITLE_ABBREVS   = new Set(['st.', 'dr.', 'prof.', 'gen.', 'kpt.', 'nr.', 'ca.', 'mfl.']);
const NAME_LONGFORM_RES = [
  { re: /\briksveg\b/i,    short: 'rv.' },
  { re: /\bfylkesveg\b/i,  short: 'fv.' },
  { re: /\bkommuneveg\b/i, short: 'kv.' },
];

function nameCheckAbbrev(name) {
  const issues = [];
  for (const lf of NAME_LONGFORM_RES) {
    if (lf.re.test(name)) issues.push({ type: 'LONGFORM', detail: name.match(lf.re)[0] + ' → ' + lf.short, confidence: 0.95 });
  }
  const tokens = name.split(/[\s\-\/]+/);
  for (const tok of tokens) {
    if (!tok.endsWith('.')) continue;
    const lc = tok.toLowerCase();
    if (NAME_ALLOWED_ABBREVS.has(lc)) continue;
    const body = lc.slice(0, -1);
    if (!body) continue;
    let conf;
    if (NAME_TITLE_ABBREVS.has(lc)) conf = 0.50;
    else if (body.length === 1) conf = 0.45;
    else if (body.length >= 2 && body.length <= 5) conf = 0.85;
    else conf = 0.70;
    issues.push({ type: 'ABBREV', detail: '"' + tok + '"', confidence: conf });
  }
  return issues;
}

function nameCheckSpecial(name) {
  const bad = [];
  for (const ch of name) {
    // Allowed: Unicode letters, digits, whitespace, - / ‘ ‘ ´ ‘ (apostrophe variants) .
    if (!/[\p{L}\p{N}\s\-\/’´’’\.]/u.test(ch)) bad.push(ch);
  }
  const uniq = [...new Set(bad)];
  if (!uniq.length) return null;
  return { type: 'SPECIAL', detail: uniq.map(function(c) { return '"' + c + '"'; }).join(' '), confidence: 1.0 };
}

function normForDup(name) {
  // Case-insensitive, whitespace-collapsed — preserves ØÅÆ so Øst ≠ Ost
  return (name || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

const names = {
  id: 'names',
  label: 'Names',
  items: [],

  mount: function(ctx) {
    this.ctx = ctx;
    this.issueF = new Set();
    this.sort = 'name';
    this.activeId = null;
    this._regionKey = null;
    this.markers = new Map();

    // Build duplicate index: muniRef → normName → stopId[]
    const dupIdx = new Map();
    for (const s of ctx.model.stops.values()) {
      const mr = s.muni ? s.muni.ref : '__none__';
      const n = normForDup(s.name); if (!n) continue;
      if (!dupIdx.has(mr)) dupIdx.set(mr, new Map());
      const bucket = dupIdx.get(mr);
      if (!bucket.has(n)) bucket.set(n, []);
      bucket.get(n).push(s.id);
    }

    // NOTE: Analysis runs synchronously here — O(n) in-memory, <100ms for 19k stops.
    // For future network-dependent analysis (e.g. geocoder per stop), make this lazy:
    // move work to a _analyze() called from render() on first open, with chunked setTimeout.
    this.items = [];
    for (const s of ctx.model.stops.values()) {
      const issues = [];

      const abbrevIssues = nameCheckAbbrev(s.name);
      for (var ai = 0; ai < abbrevIssues.length; ai++) issues.push(abbrevIssues[ai]);

      const sc = nameCheckSpecial(s.name);
      if (sc) issues.push(sc);

      const mr = s.muni ? s.muni.ref : '__none__';
      const bucket = dupIdx.get(mr);
      if (bucket) {
        const n = normForDup(s.name);
        const peers = (bucket.get(n) || []).filter(function(id) {
          if (id === s.id) return false;
          const other = ctx.model.stops.get(id);
          if (!other) return false;
          // Allow: siblings in same multimodal cluster, or direct parent-child
          if (s.parentRef && s.parentRef === other.parentRef) return false;
          if (s.parentRef === other.id || other.parentRef === s.id) return false;
          return true;
        });
        if (peers.length > 0) {
          const peerNames = peers.slice(0, 3).map(function(id) {
            const o = ctx.model.stops.get(id); return o ? o.name : id;
          });
          issues.push({
            type: 'DUPLICATE',
            detail: 'Also: ' + peerNames.join(', ') + (peers.length > 3 ? ' +' + (peers.length - 3) + ' more' : ''),
            confidence: 1.0,
            peers: peers,
          });
        }
      }

      if (!issues.length) continue;
      const maxConf = issues.reduce(function(m, i) { return Math.max(m, i.confidence || 0); }, 0);
      const worstColor = issues.find(function(i) { return i.type === 'SPECIAL'; })   ? NAME_ISSUE_META.SPECIAL.color
                       : issues.find(function(i) { return i.type === 'DUPLICATE'; }) ? NAME_ISSUE_META.DUPLICATE.color
                       : issues.find(function(i) { return i.type === 'ABBREV'; })    ? NAME_ISSUE_META.ABBREV.color
                       : NAME_ISSUE_META.LONGFORM.color;
      this.items.push({ stop: s, issues: issues, maxConf: maxConf, worstColor: worstColor, search: (s.name + ' ' + s.id).toLowerCase() });
    }

    ctx.pane.innerHTML =
      '<div class="pane-top">'
      + '<div class="pane-title"><span>Name issues</span><span class="pane-count" id="nm-count">—</span></div>'
      + '<div id="nm-stats"></div>'
      + '<div class="sum-label">By issue type</div><div class="sum-row" id="nm-issues"></div>'
      + '<input id="nm-search" type="text" placeholder="Filter by name or ID…" autocomplete="off"/>'
      + '<label class="ctl" style="margin-top:7px">Sort<select id="nm-sort">'
      + '<option value="name">Name A–Z</option>'
      + '<option value="conf">Confidence (high first)</option>'
      + '</select></label></div>'
      + '<div class="pane-list" id="nm-list"></div>';

    const self = this;
    ctx.pane.querySelector('#nm-search').addEventListener('input', debounce(function() { self.render(); }, 150));
    ctx.pane.querySelector('#nm-sort').addEventListener('change', function(e) { self.sort = e.target.value; self.renderList(); });
    ctx.pane.querySelector('#nm-issues').addEventListener('click', function(e) {
      const pill = e.target.closest('.sum-pill'); if (!pill) return;
      const v = pill.dataset.val;
      if (self.issueF.has(v)) self.issueF.delete(v); else self.issueF.add(v);
      self.render();
    });
  },

  inRegion: function() {
    const self = this;
    return this.items.filter(function(it) { return self.ctx.region.matches(it.stop); });
  },

  visible: function() {
    const self = this;
    const q = this.ctx.pane.querySelector('#nm-search').value.toLowerCase();
    return this.inRegion().filter(function(it) {
      if (q && !it.search.includes(q)) return false;
      if (self.issueF.size && !it.issues.some(function(iss) { return self.issueF.has(iss.type); })) return false;
      return true;
    });
  },

  render: function() {
    this.renderStats();
    this.renderList();
    this.renderMarkers();
    const key = JSON.stringify(this.ctx.region.get());
    if (key !== this._regionKey) {
      this._regionKey = key;
      const pts = this.visible().map(function(it) { return it.stop.coord; }).filter(Boolean);
      if (pts.length) this.ctx.map.fit(pts);
    }
  },

  renderStats: function() {
    const region = this.inRegion();
    const vis = this.visible();
    const typeCounts = {};
    for (const k of Object.keys(NAME_ISSUE_META)) typeCounts[k] = 0;
    for (const it of region) {
      const seen = new Set();
      for (const iss of it.issues) { if (!seen.has(iss.type)) { seen.add(iss.type); typeCounts[iss.type]++; } }
    }
    this.ctx.pane.querySelector('#nm-stats').innerHTML =
      '<div class="stat-grid compact">'
      + '<div class="stat-card"><div class="stat-num">' + region.length.toLocaleString() + '</div><div class="stat-lbl">stops with issues</div></div>'
      + '<div class="stat-card"><div class="stat-num">' + vis.length.toLocaleString() + '</div><div class="stat-lbl">visible</div></div>'
      + '</div>';
    const self = this;
    const pills = Object.keys(NAME_ISSUE_META).filter(function(k) { return typeCounts[k] > 0; }).map(function(k) {
      const m = NAME_ISSUE_META[k];
      return '<span class="sum-pill' + (self.issueF.has(k) ? ' active' : '') + '" data-val="' + k + '">'
        + '<span class="sum-swatch" style="background:' + m.color + '"></span>' + escHtml(m.label) + ' ' + typeCounts[k].toLocaleString() + '</span>';
    }).join('');
    this.ctx.pane.querySelector('#nm-issues').innerHTML = pills || '<span class="muted">none</span>';
    this.ctx.pane.querySelector('#nm-count').textContent = vis.length.toLocaleString() + ' / ' + region.length.toLocaleString();
  },

  sorted: function(items) {
    const a = items.slice();
    if (this.sort === 'conf') a.sort(function(x, y) { return y.maxConf - x.maxConf; });
    else a.sort(function(x, y) { return x.stop.name.localeCompare(y.stop.name, 'no'); });
    return a;
  },

  issueLines: function(issues) {
    return issues.map(function(iss) {
      const m = NAME_ISSUE_META[iss.type];
      let line = '<span style="color:' + m.color + ';font-weight:600">' + escHtml(m.label) + ':</span> ' + escHtml(iss.detail);
      if (iss.type === 'ABBREV') line += ' <span style="color:#aaa;font-size:10px">' + Math.round(iss.confidence * 100) + '%</span>';
      return line;
    }).join('<br>');
  },

  renderList: function() {
    const vis = this.sorted(this.visible());
    this.ctx.pane.querySelector('#nm-count').textContent = vis.length.toLocaleString() + ' / ' + this.inRegion().length.toLocaleString();
    const list = this.ctx.pane.querySelector('#nm-list');
    list.innerHTML = '';
    const CAP = 400;
    const self = this;
    vis.slice(0, CAP).forEach(function(it) {
      const s = it.stop;
      const div = document.createElement('div');
      div.className = 'stop-item' + (s.id === self.activeId ? ' active' : '');
      div.dataset.id = s.id;
      const href = CONFIG.nsrStopUrl.replace('{id}', s.id);
      let safe = '#'; try { if (new URL(href).protocol === 'https:') safe = href; } catch (_) {}
      const seen = new Set();
      const badges = it.issues.filter(function(iss) {
        if (seen.has(iss.type)) return false; seen.add(iss.type); return true;
      }).map(function(iss) {
        return '<span class="tg-name" style="background:' + NAME_ISSUE_META[iss.type].color + '">' + escHtml(NAME_ISSUE_META[iss.type].label) + '</span>';
      }).join('');
      div.innerHTML =
        '<div class="si-name"><span class="tg-dot" style="background:' + it.worstColor + '"></span>' + escHtml(s.name)
        + '<a class="si-nsr-link" href="' + escHtml(safe) + '" target="_blank" rel="noopener">' + escHtml(CONFIG.nsrLinkLabel) + '</a></div>'
        + '<div class="si-id">' + escHtml(s.id) + '</div>'
        + '<div class="tg-line">' + badges + '</div>'
        + '<div class="nm-detail">' + self.issueLines(it.issues) + '</div>';
      div.querySelector('.si-nsr-link').addEventListener('click', function(e) { e.stopPropagation(); });
      div.addEventListener('click', function() { self.select(it, false); });
      list.appendChild(div);
    });
    if (vis.length > CAP) {
      const m = document.createElement('div'); m.className = 'list-more';
      m.textContent = 'Showing first ' + CAP + ' of ' + vis.length.toLocaleString() + ' — narrow the filter.';
      list.appendChild(m);
    }
  },

  nmIcon: function(it, active) {
    const r = active ? 11 : 8, sw = active ? 2.5 : 1.5, size = r * 2 + sw * 2 + 4, c = size / 2;
    return L.divIcon({
      className: '', iconSize: [size, size], iconAnchor: [c, c],
      html: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '"><circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="' + it.worstColor + '" stroke="' + (active ? '#1a1a2e' : 'rgba(0,0,0,0.35)') + '" stroke-width="' + sw + '"/></svg>',
    });
  },

  renderMarkers: function() {
    const layer = this.ctx.layer;
    const self = this;
    layer.eachLayer(function(l) { l.off(); }); layer.clearLayers(); this.markers.clear();
    for (const it of this.visible()) {
      if (!it.stop.coord) continue;
      const m = L.marker(it.stop.coord, { icon: self.nmIcon(it, it.stop.id === self.activeId) })
        .addTo(layer)
        .bindTooltip(it.stop.name, { direction: 'top', offset: [0, -8] });
      m.on('click', function() { self.select(it, true); });
      self.markers.set(it.stop.id, m);
    }
  },

  select: function(it, fromMap) {
    const prev = this.activeId;
    this.activeId = it.stop.id;
    if (prev && this.markers.has(prev)) {
      const p = this.items.find(function(x) { return x.stop.id === prev; });
      if (p) this.markers.get(prev).setIcon(this.nmIcon(p, false));
    }
    const m = this.markers.get(it.stop.id);
    if (m) { m.setIcon(this.nmIcon(it, true)); m.setZIndexOffset(1000); }
    this.ctx.pane.querySelectorAll('.stop-item.active').forEach(function(el) { el.classList.remove('active'); });
    const row = this.ctx.pane.querySelector('.stop-item[data-id="' + CSS.escape(it.stop.id) + '"]');
    if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    if (it.stop.coord) {
      if (!fromMap) this.ctx.map.map.setView(it.stop.coord, Math.max(this.ctx.map.map.getZoom(), 13), { animate: true });
      if (m) m.openPopup();
    }
  },
};

// ── tools/untouched.js ───────────────────────────────────────────────────────

const untouched = {
  id: 'untouched',
  label: 'Untouched',

  mount: function(ctx) {
    this.ctx = ctx;
    this.modeF = new Set();
    this.sort = 'name';
    this.activeId = null;
    this._regionKey = null;
    this.markers = new Map();

    this.items = [];
    for (const s of ctx.model.stops.values()) {
      const effMs = s.fromDate != null ? s.fromDate : (s.changed != null ? s.changed : s.created);
      if (effMs == null) continue;
      const d = new Date(effMs);
      if (!(d.getUTCFullYear() === 2017 && d.getUTCMonth() === 5)) continue;
      const mode = modeOf(s);
      this.items.push({
        stop: s,
        mode: mode,
        effDate: effMs,
        search: (s.name + ' ' + s.id).toLowerCase(),
      });
    }

    ctx.pane.innerHTML =
      '<div class="pane-top">'
      + '<div class="pane-title"><span>Untouched since launch</span><span class="pane-count" id="un-count">—</span></div>'
      + '<div id="un-stats"></div>'
      + '<div class="sum-label">By transport mode</div><div class="sum-row" id="un-modes"></div>'
      + '<input id="un-search" type="text" placeholder="Filter by name or ID…" autocomplete="off"/>'
      + '<label class="ctl">Sort'
      + '<select id="un-sort">'
      + '<option value="name">Name</option>'
      + '<option value="oldest">Oldest date first</option>'
      + '<option value="newest">Newest date first</option>'
      + '</select></label></div>'
      + '<div class="pane-list" id="un-list"></div>';

    const self = this;
    ctx.pane.querySelector('#un-search').addEventListener('input', debounce(function() { self.render(); }, 150));
    ctx.pane.querySelector('#un-sort').addEventListener('change', function(e) { self.sort = e.target.value; self.renderList(); });
    ctx.pane.querySelector('#un-modes').addEventListener('click', function(e) {
      const pill = e.target.closest('.sum-pill'); if (!pill) return;
      const v = pill.dataset.val;
      if (self.modeF.has(v)) self.modeF.delete(v); else self.modeF.add(v);
      self.render();
    });
  },

  inRegion: function() {
    const self = this;
    return this.items.filter(function(it) { return self.ctx.region.matches(it.stop); });
  },

  visible: function() {
    const self = this;
    const q = this.ctx.pane.querySelector('#un-search').value.toLowerCase();
    return this.inRegion().filter(function(it) {
      if (q && !it.search.includes(q)) return false;
      if (self.modeF.size && !self.modeF.has(it.mode)) return false;
      return true;
    });
  },

  render: function() {
    this.renderStats();
    this.renderList();
    this.renderMarkers();
    const key = JSON.stringify(this.ctx.region.get());
    if (key !== this._regionKey) {
      this._regionKey = key;
      const pts = this.visible().map(function(it) { return it.stop.coord; }).filter(Boolean);
      if (pts.length) this.ctx.map.fit(pts);
    }
  },

  renderStats: function() {
    const region = this.inRegion();
    const vis = this.visible();
    let regionStopCount = 0;
    for (const s of this.ctx.model.stops.values()) { if (this.ctx.region.matches(s)) regionStopCount++; }
    const pct = regionStopCount ? Math.round(region.length / regionStopCount * 100) : 0;
    const modeCount = {};
    for (const it of region) modeCount[it.mode] = (modeCount[it.mode] || 0) + 1;
    const self = this;
    this.ctx.pane.querySelector('#un-stats').innerHTML =
      '<div class="stat-grid compact">'
      + '<div class="stat-card"><div class="stat-num">' + vis.length.toLocaleString() + '</div><div class="stat-lbl">untouched stops</div></div>'
      + '<div class="stat-card"><div class="stat-num">' + pct + '%</div><div class="stat-lbl">of region stops</div></div>'
      + '</div>';
    const pills = orderModes(Object.keys(modeCount)).map(function(m) {
      return '<span class="sum-pill' + (self.modeF.has(m) ? ' active' : '') + '" data-val="' + escHtml(m) + '">'
        + '<span class="sum-swatch" style="background:' + modeColor(m) + '"></span>'
        + escHtml(m) + ' ' + modeCount[m].toLocaleString() + '</span>';
    }).join('');
    this.ctx.pane.querySelector('#un-modes').innerHTML = pills || '<span class="muted">none</span>';
  },

  sorted: function(items) {
    const a = items.slice();
    if (this.sort === 'oldest') a.sort(function(x, y) { return (x.effDate || 0) - (y.effDate || 0); });
    else if (this.sort === 'newest') a.sort(function(x, y) { return (y.effDate || 0) - (x.effDate || 0); });
    else a.sort(function(x, y) { return x.stop.name.localeCompare(y.stop.name, 'no'); });
    return a;
  },

  unIcon: function(it, active) {
    const r = active ? 11 : 8, sw = active ? 2.5 : 1.5, size = r * 2 + sw * 2 + 4, c = size / 2;
    return L.divIcon({
      className: '', iconSize: [size, size], iconAnchor: [c, c], zIndexOffset: active ? 1000 : 0,
      html: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" xmlns="http://www.w3.org/2000/svg"><circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="' + modeColor(it.mode) + '" stroke="' + (active ? '#1a1a2e' : 'rgba(0,0,0,0.35)') + '" stroke-width="' + sw + '"/></svg>',
    });
  },

  popupHtml: function(it) {
    const s = it.stop;
    return '<div class="lp"><div class="lp-title">' + escHtml(s.name) + '</div>'
      + '<div class="lp-id">' + escHtml(s.id) + '</div>'
      + '<div class="tg-line"><span class="tg-name" style="background:' + modeColor(it.mode) + '">' + escHtml(it.mode) + '</span>'
      + (s.version ? '<span class="tg-age">v' + s.version + '</span>' : '')
      + '<span class="si-lang">' + fmtDate(it.effDate) + '</span></div>'
      + '</div>';
  },

  renderList: function() {
    const vis = this.sorted(this.visible());
    this.ctx.pane.querySelector('#un-count').textContent = vis.length.toLocaleString() + ' / ' + this.inRegion().length.toLocaleString();
    const list = this.ctx.pane.querySelector('#un-list');
    list.innerHTML = '';
    const CAP = 400;
    const self = this;
    vis.slice(0, CAP).forEach(function(it) {
      const s = it.stop;
      const div = document.createElement('div');
      div.className = 'stop-item' + (s.id === self.activeId ? ' active' : '');
      div.dataset.id = s.id;
      const href = CONFIG.nsrStopUrl.replace('{id}', s.id);
      let safe = '#'; try { if (new URL(href).protocol === 'https:') safe = href; } catch (_) {}
      div.innerHTML =
        '<div class="si-name"><span class="tg-dot" style="background:' + modeColor(it.mode) + '"></span>' + escHtml(s.name)
        + '<a class="si-nsr-link" href="' + escHtml(safe) + '" target="_blank" rel="noopener">' + escHtml(CONFIG.nsrLinkLabel) + '</a></div>'
        + '<div class="si-id">' + escHtml(s.id) + '</div>'
        + '<div class="tg-line"><span class="tg-name" style="background:' + modeColor(it.mode) + '">' + escHtml(it.mode) + '</span>'
        + (s.version ? '<span class="tg-age">v' + s.version + '</span>' : '')
        + '<span class="si-lang">' + fmtDate(it.effDate) + '</span></div>';
      div.querySelector('.si-nsr-link').addEventListener('click', function(e) { e.stopPropagation(); });
      div.addEventListener('click', function() { self.select(it, false); });
      list.appendChild(div);
    });
    if (vis.length > CAP) {
      const m = document.createElement('div'); m.className = 'list-more';
      m.textContent = 'Showing first ' + CAP + ' of ' + vis.length.toLocaleString() + ' — narrow the filter.';
      list.appendChild(m);
    }
  },

  renderMarkers: function() {
    const layer = this.ctx.layer;
    const self = this;
    layer.eachLayer(function(l) { l.off(); }); layer.clearLayers(); this.markers.clear();
    for (const it of this.visible()) {
      if (!it.stop.coord) continue;
      const m = L.marker(it.stop.coord, { icon: self.unIcon(it, it.stop.id === self.activeId) })
        .addTo(layer)
        .bindTooltip(it.stop.name, { direction: 'top', offset: [0, -8] })
        .bindPopup(self.popupHtml(it));
      m.on('click', function() { self.select(it, true); });
      self.markers.set(it.stop.id, m);
    }
  },

  select: function(it, fromMap) {
    const self = this;
    const prev = this.activeId;
    this.activeId = it.stop.id;
    if (prev && this.markers.has(prev)) { const p = this.items.find(function(x) { return x.stop.id === prev; }); if (p) this.markers.get(prev).setIcon(this.unIcon(p, false)); }
    const m = this.markers.get(it.stop.id);
    if (m) { m.setIcon(this.unIcon(it, true)); m.setZIndexOffset(1000); }
    this.ctx.pane.querySelectorAll('.stop-item.active').forEach(function(el) { el.classList.remove('active'); });
    const row = this.ctx.pane.querySelector('.stop-item[data-id="' + CSS.escape(it.stop.id) + '"]');
    if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    if (it.stop.coord) { if (!fromMap) this.ctx.map.map.setView(it.stop.coord, Math.max(this.ctx.map.map.getZoom(), 13), { animate: true }); if (m) m.openPopup(); }
  },
};

function rcAgeText(days) {
  if (days < 1) return 'today';
  if (days < 60) return days + 'd';
  if (days < 730) return Math.floor(days / 30.44) + 'mnd';
  return (days / 365.25).toFixed(1) + 'y';
}

const recentchanges = {
  id: 'recentchanges',
  label: 'Recent changes',

  mount: function(ctx) {
    this.ctx = ctx;
    this.modeF = new Set();
    this.newOnly = false;
    this.sort = 'recent';
    this.window = 'month';
    this.activeId = null;
    this._regionKey = null;
    this.markers = new Map();
    this.windows = [
      { key: 'week',  label: 'Last week',    days: 7  },
      { key: 'month', label: 'Last month',   days: 30 },
      { key: 'q',     label: 'Last 90 days', days: 90 },
    ];

    const now = ctx.model.publishedAt ? Date.parse(ctx.model.publishedAt) : Date.now();
    this.now = Number.isFinite(now) ? now : Date.now();

    this.items = [];
    for (const s of ctx.model.stops.values()) {
      const editDate = s.changed != null ? s.changed : (s.fromDate != null ? s.fromDate : s.created);
      if (editDate == null) continue;
      const mode = modeOf(s);
      const ageDays = Math.floor((this.now - editDate) / 86400000);
      this.items.push({
        stop: s,
        mode: mode,
        editDate: editDate,
        ageDays: ageDays,
        isNew: s.version === 1,
        search: (s.name + ' ' + s.id).toLowerCase(),
      });
    }

    const winBtns = this.windows.map(function(w) {
      return '<button data-win="' + w.key + '">' + escHtml(w.label) + '</button>';
    }).join('');

    ctx.pane.innerHTML =
      '<div class="pane-top">'
      + '<div class="pane-title"><span>Recent changes</span><span class="pane-count" id="rc-count">—</span></div>'
      + '<div class="map-mode" id="rc-window">' + winBtns + '</div>'
      + '<div id="rc-stats"></div>'
      + '<div class="sum-label">By transport mode</div><div class="sum-row" id="rc-modes"></div>'
      + '<input id="rc-search" type="text" placeholder="Filter by name or ID…" autocomplete="off"/>'
      + '<div class="pane-controls">'
      + '<label class="ctl">Sort'
      + '<select id="rc-sort">'
      + '<option value="recent">Most recent first</option>'
      + '<option value="oldest">Oldest first</option>'

      + '</select></label></div>'
      + '<button id="rc-newonly" class="filter-toggle">⚠ Only new stops</button>'
      + '</div>'
      + '<div class="pane-list" id="rc-list"></div>';

    const self = this;
    // set initial active window button
    ctx.pane.querySelectorAll('#rc-window button').forEach(function(b) {
      b.classList.toggle('active', b.dataset.win === self.window);
    });
    ctx.pane.querySelector('#rc-window').addEventListener('click', function(e) {
      const b = e.target.closest('button'); if (!b) return;
      self.window = b.dataset.win;
      ctx.pane.querySelectorAll('#rc-window button').forEach(function(x) { x.classList.toggle('active', x.dataset.win === self.window); });
      self._regionKey = null; // force refit on window change
      self.render();
    });
    ctx.pane.querySelector('#rc-search').addEventListener('input', debounce(function() { self.render(); }, 150));
    ctx.pane.querySelector('#rc-sort').addEventListener('change', function(e) { self.sort = e.target.value; self.renderList(); });
    ctx.pane.querySelector('#rc-newonly').addEventListener('click', function(e) {
      self.newOnly = !self.newOnly;

    });

      const pill = e.target.closest('.sum-pill'); if (!pill) return;
      const v = pill.dataset.val;
      if (self.modeF.has(v)) self.modeF.delete(v); else self.modeF.add(v);
      self.render();
    });
  },

  windowDays: function() {
    const w = this.windows.find(function(x) { return x.key === this.window; }, this);

  },

  inRegion: function() {
    const self = this;
    const cutoff = this.now - this.windowDays() * 86400000;
    return this.items.filter(function(it) {
      return it.editDate >= cutoff && self.ctx.region.matches(it.stop);

  visible: function() {

  },

  rcIcon: function(it, active) {
    const days = this.windowDays();
    const frac = Math.min(1, it.ageDays / days);
    const r = Math.round(11 - 6 * frac) + (active ? 2 : 0);

    });

  // Older = smaller = on top, so old pins stay visible under newer/bigger ones.

    const prev = this.activeId;
    this.activeId = it.stop.id;
    if (prev && this.markers.has(prev)) { const p = this.items.find(function(x) { return x.stop.id === prev; }); if (p) { this.markers.get(prev).setIcon(this.rcIcon(p, false)); this.markers.get(prev).setZIndexOffset(this.rcZOffset(p, false)); } }
    const m = this.markers.get(it.stop.id);
    if (m) { m.setIcon(this.rcIcon(it, true)); m.setZIndexOffset(this.rcZOffset(it, true)); }
    this.ctx.pane.querySelectorAll('.stop-item.active').forEach(function(el) { el.classList.remove('active'); });
    const row = this.ctx.pane.querySelector('.stop-item[data-id="' + CSS.escape(it.stop.id) + '"]');
    if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    if (it.stop.coord) { if (!fromMap) this.ctx.map.map.setView(it.stop.coord, Math.max(this.ctx.map.map.getZoom(), 13), { animate: true }); if (m) m.openPopup(); }
  },
};

// ── app.js ───────────────────────────────────────────────────────────────────

const ALL_TOOLS = [overview, altnames, names, tags, gosp, untouched, recentchanges];
const TOOLS = ALL_TOOLS.filter(function(t) { return CONFIG.tools ? CONFIG.tools[t.id] !== false : true; });

const PARSE_OPTS = {
  alts:    !CONFIG.tools || CONFIG.tools.altnames !== false,
  tags:    !CONFIG.tools || CONFIG.tools.tags !== false,
  gosp:    !CONFIG.tools || CONFIG.tools.gosp !== false,
  history: !CONFIG.tools || CONFIG.tools.untouched !== false || CONFIG.tools.recentchanges !== false,
};

applyTheme();

const $ = function(id) { return document.getElementById(id); };
const mapApi = createMap('map');
const filter = createRegionFilter();

let model = null;
let regions = null;
let activeTab = null;

const bgSel = $('map-bg');
mapApi.backgrounds.forEach(function(name) {
  const o = document.createElement('option');
  o.value = name; o.textContent = name;
  bgSel.appendChild(o);
});
bgSel.addEventListener('change', function(e) { mapApi.setBackground(e.target.value); });

$('btn-export').href = CONFIG.exportUrl;
$('btn-load').addEventListener('click', function() { $('file-input').click(); });
$('file-input').addEventListener('change', function(e) {
  const f = e.target.files && e.target.files[0];
  if (f) loadFile(f);
  e.target.value = '';
});

// Extracts the first .xml entry from a ZIP file using native DecompressionStream.
async function unzipToXml(file) {
  const buf = await file.arrayBuffer();
  const view = new DataView(buf);
  const len = buf.byteLength;

  // Find End-of-Central-Directory record (scan backwards; max ZIP comment = 65535 bytes)
  let eocd = -1;
  const searchStart = Math.max(0, len - 65558);
  for (let i = len - 22; i >= searchStart; i--) {
    if (view.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error('Not a valid ZIP file');

  const cdCount  = view.getUint16(eocd + 10, true);
  const cdOffset = view.getUint32(eocd + 16, true);
  if (cdOffset === 0xffffffff || cdCount === 0xffff) {
    throw new Error('ZIP64 format is not supported — please extract the XML file manually');
  }

  // Walk central directory to find first .xml entry
  let off = cdOffset;
  for (let i = 0; i < cdCount; i++) {
    if (view.getUint32(off, true) !== 0x02014b50) throw new Error('Invalid ZIP central directory');
    const method     = view.getUint16(off + 10, true);
    const compSize   = view.getUint32(off + 20, true);
    const fnLen      = view.getUint16(off + 28, true);
    const extraLen   = view.getUint16(off + 30, true);
    const commentLen = view.getUint16(off + 32, true);
    const localOff   = view.getUint32(off + 42, true);
    const fname      = new TextDecoder().decode(new Uint8Array(buf, off + 46, fnLen));
    off += 46 + fnLen + extraLen + commentLen;
    if (!fname.toLowerCase().endsWith('.xml')) continue;

    // Locate compressed data via local file header
    if (view.getUint32(localOff, true) !== 0x04034b50) throw new Error('Invalid local file header for ' + fname);
    const lFnLen    = view.getUint16(localOff + 26, true);
    const lExtraLen = view.getUint16(localOff + 28, true);
    const dataOff   = localOff + 30 + lFnLen + lExtraLen;
    const compressed = new Uint8Array(buf, dataOff, compSize);

    if (method === 0) {
      return new File([compressed], fname, { type: 'application/xml' });
    }
    if (method === 8) {
      if (typeof DecompressionStream === 'undefined') {
        throw new Error('Your browser does not support DecompressionStream (Chrome 80+, Firefox 113+, Safari 16.4+ required)');
      }
      const ds = new DecompressionStream('deflate-raw');
      const writer = ds.writable.getWriter();
      const reader = ds.readable.getReader();
      writer.write(compressed);
      writer.close();
      const chunks = [];
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      return new File([new Blob(chunks)], fname, { type: 'application/xml' });
    }
    throw new Error('Unsupported ZIP compression method ' + method + ' for ' + fname + ' — please extract the XML manually');
  }
  throw new Error('No XML file found in the ZIP archive');
}

// Simple styled confirm dialog (used for the Untouched pin-count warning).
function showConfirm(title, msg, onOk) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:3000';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:10px;padding:28px 32px;min-width:320px;max-width:440px;box-shadow:0 8px 36px rgba(0,0,0,0.3)">'
    + '<div style="font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:8px">' + escHtml(title) + '</div>'
    + '<div style="font-size:13px;color:#444;line-height:1.65;margin-bottom:20px">' + msg + '</div>'
    + '<div style="display:flex;gap:10px;justify-content:flex-end">'
    + '<button id="dlg-cancel" style="padding:8px 18px;border:1px solid #d0d0d0;border-radius:5px;background:#fff;cursor:pointer;font-size:13px;color:#444">Pick a region first</button>'
    + '<button id="dlg-ok" style="padding:8px 18px;background:var(--c-primary);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600">Load anyway</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  overlay.querySelector('#dlg-cancel').addEventListener('click', function() { document.body.removeChild(overlay); });
  overlay.querySelector('#dlg-ok').addEventListener('click', function() { document.body.removeChild(overlay); onOk(); });
}

let loading = false;
async function loadFile(file) {
  if (loading) return;
  loading = true;
  // Clear previous data immediately so stale pins/tabs don't linger
  if (activeTab) { mapApi.map.removeLayer(activeTab._ctx.layer); activeTab = null; }
  $('tabs').innerHTML = '';
  $('sidebar').innerHTML = '';
  model = null; regions = null;
  showOverlay(true);
  $('btn-load').disabled = true;
  try {
    let xmlFile = file;
    if (file.name.toLowerCase().endsWith('.zip')) {
      setStatus('Extracting XML from ZIP…');
      xmlFile = await unzipToXml(file);
    }
    setStatus('Reading ' + xmlFile.name + '…');
    model = await parseNetex(xmlFile, function(frac, m) { setProgress(frac, m.stops.size); }, PARSE_OPTS);
    regions = resolveRegions(model);
    initData(xmlFile.name);
  } catch (err) {
    console.error('Load error:', err);
    setStatus('Error: ' + (err && err.message ? err.message : 'Failed to read the file — see console for details.'));
    $('empty-hint').classList.remove('hidden');
  } finally {
    loading = false;
    showOverlay(false);
    $('btn-load').disabled = false;
  }
}

function initData(fileName) {
  $('empty-hint').classList.add('hidden');

  const countySel = $('region-county');
  const muniSel = $('region-muni');
  countySel.innerHTML = '<option value="">All counties</option>'
    + regions.countyList.map(function(c) { return '<option value="' + attr(c.ref) + '">' + esc(c.name) + ' (' + c.count + ')</option>'; }).join('');
  countySel.disabled = false;
  muniSel.disabled = false;
  filter.set('', '');
  syncMuniOptions('');

  countySel.onchange = function() { syncMuniOptions(countySel.value); applyRegion(countySel.value, ''); };
  muniSel.onchange = function() { applyRegion(countySel.value, muniSel.value); };

  const tabsEl = $('tabs');
  const sidebar = $('sidebar');
  tabsEl.innerHTML = '';
  sidebar.innerHTML = '';
  activeTab = null;
  for (const tool of TOOLS) {
    const pane = document.createElement('div');
    pane.className = 'tool-pane';
    pane.dataset.tool = tool.id;
    sidebar.appendChild(pane);

    const tab = document.createElement('button');
    tab.className = 'tab';
    tab.textContent = tool.label;
    tab.dataset.tool = tool.id;
    tab.addEventListener('click', (function(t) {
      return function() {
        if (t.id === 'untouched' && t.items) {
          const cnt = t.items.filter(function(it) { return filter.matches(it.stop); }).length;
          if (cnt > 5000) {
            showConfirm(
              'That’s a lot of pins',
              'There are <strong>' + cnt.toLocaleString() + '</strong> untouched stops in the current view — rendering all their map pins may be slow on older hardware.<br><br>Consider picking a county or municipality to narrow the selection first.',
              function() { activate(t); }
            );
            return;
          }
        }
        activate(t);
      };
    })(tool));
    tabsEl.appendChild(tab);

    tool._ctx = {
      model: model, regions: regions, region: filter, map: mapApi,
      layer: L.layerGroup(), pane: pane, setRegion: setRegion,
    };
    tool._tab = tab;
    tool.mount(tool._ctx);
  }

  const total = model.stops.size.toLocaleString();
  setStatus(fileName + ' — ' + total + ' stops, ' + model.gosps.length.toLocaleString() + ' groups, ' + regions.countyList.length + ' counties');
  activate(TOOLS[0]);
}

function syncMuniOptions(countyRef) {
  const muniSel = $('region-muni');
  const county = regions.countyList.find(function(c) { return c.ref === countyRef; });
  const munis = county ? county.munis : [];
  muniSel.innerHTML = '<option value="">All municipalities</option>'
    + munis.map(function(m) { return '<option value="' + attr(m.ref) + '">' + esc(m.name) + ' (' + m.count + ')</option>'; }).join('');
  muniSel.disabled = !county;
}

function applyRegion(county, muni) {
  filter.set(county, muni);
  if (activeTab) activeTab.render();
}

function setRegion(county, muni) {
  $('region-county').value = county;
  syncMuniOptions(county);
  $('region-muni').value = muni;
  applyRegion(county, muni);
}

function activate(tool) {
  if (activeTab === tool) return;
  if (activeTab) {
    activeTab._tab.classList.remove('active');
    activeTab._ctx.pane.classList.remove('active');
    mapApi.map.removeLayer(activeTab._ctx.layer);
  }
  activeTab = tool;
  tool._tab.classList.add('active');
  tool._ctx.pane.classList.add('active');
  tool._ctx.layer.addTo(mapApi.map);
  tool.render();
}

function setStatus(msg) { $('status').textContent = msg; }
function showOverlay(show) { $('overlay').classList.toggle('show', show); }
function setProgress(frac, found) {
  const pct = Math.round(frac * 100);
  $('ov-fill').style.width = pct + '%';
  $('ov-stats').textContent = pct + '% · ' + found.toLocaleString() + ' stops';
}
function esc(s) { return (s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function attr(s) { return esc(s).replace(/"/g, '&quot;'); }

})();
</script>
