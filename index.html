<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiamat QA</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --accent: #1a73e8;
      --text: #1f2933;
      --muted: #647281;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }
    h1 { margin: 0 0 0.5rem; font-size: 2rem; }
    p.lead { margin: 0 0 2.5rem; color: var(--muted); }
    .cards {
      display: grid;
      gap: 1.25rem;
      width: 100%;
      max-width: 720px;
    }
    a.card {
      display: block;
      background: var(--card);
      border: 1px solid #e1e6eb;
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }
    a.card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    a.card h2 {
      margin: 0 0 0.35rem;
      font-size: 1.2rem;
      color: var(--accent);
    }
    a.card span { color: var(--muted); font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Tiamat QA</h1>
  <p class="lead">Quality-assurance viewers</p>
  <div class="cards">
    <a class="card" href="alternativename-qa/">
      <h2>AlternativeNames QA Viewer</h2>
      <span>alternativename-qa/</span>
    </a>
    <a class="card" href="gosp-qa/">
      <h2>GOSP QA Viewer</h2>
      <span>gosp-qa/</span>
    </a>
  </div>
</body>
</html>
